    ctx.fillStyle=d.c1;ctx.fillRect(-4,-5,8,3);
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(-4,-5,8,1);
    if(tier>=1){ctx.fillStyle=d.c1;ctx.fillRect(-6,-1,12,1);}
    if(tier>=2){ctx.fillStyle='#fff';ctx.fillRect(-3,-4,1,1);ctx.fillRect(2,-4,1,1);
      ctx.fillStyle=d.c1;ctx.fillRect(-7,-3,1,5);ctx.fillRect(6,-3,1,5);}
    const blen=(type==='sniper'?12:type==='cannon'?8:type==='archer'?9:7)+tier;
    const bw=(type==='cannon'?4:type==='sniper'?2:2)+(tier>1?1:0);
    ctx.save();ctx.rotate(angle);
    ctx.fillStyle=d.c3;ctx.fillRect(0,-Math.ceil(bw/2)-1,blen,bw+2);
    ctx.fillStyle=d.c2;ctx.fillRect(0,-Math.ceil(bw/2),blen,bw);
    ctx.fillStyle=d.c1;ctx.fillRect(blen-2,-Math.ceil(bw/2),2,bw);
    if(type==='archer'){
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(blen+1,-1);ctx.lineTo(blen+1,1);ctx.lineTo(0,3);ctx.stroke();
    }
    if(muzzle>0){
      ctx.fillStyle='#fff8d0';ctx.fillRect(blen,-1,4,2);
      ctx.fillStyle='#ffaa44';ctx.fillRect(blen+2,-2,3,4);
      ctx.fillStyle=d.c1;ctx.fillRect(blen+5,-1,2,2);
    }
    ctx.restore();this._td(ctx,tier);ctx.restore();
  },
  _td(ctx,tier){for(let i=0;i<3;i++){ctx.fillStyle=i<=tier?'#ffd54a':'#444';ctx.fillRect(-3+i*3,7,2,1);}},
  enemy(ctx,e){
    const x=e.x,y=e.y,s=e.size,half=s/2;
    if(e.dodging&&e.type==='phantom')ctx.globalAlpha=.4;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();ctx.ellipse(x,y+half-1,half-1,2.5,0,0,Math.PI*2);ctx.fill();
    const c1=e.flash>0?'#fff':e.c1;
    const c2=e.flash>0?'#ffe':e.c2;
    if(e.isBoss){ctx.fillStyle='#000';ctx.fillRect(x-half-1,y-half-1,s+2,s+2);}
    if(e.frozen>0){
      ctx.fillStyle='rgba(160,232,240,0.6)';
      ctx.fillRect(x-half-2,y-half-2,s+4,s+4);
    }
    if(e.type==='grunt'||e.type==='behemoth'){
      ctx.fillStyle=c2;ctx.fillRect(x-half,y-half,s,s);
      ctx.fillStyle=c1;ctx.fillRect(x-half+1,y-half+1,s-2,s-3);
      ctx.fillStyle='#000';
      ctx.fillRect((x-half+s*.25)|0,(y-half+s*.35)|0,2,2);
      ctx.fillRect((x-half+s*.65)|0,(y-half+s*.35)|0,2,2);
      ctx.fillStyle='#fff';
      ctx.fillRect((x-half+s*.25)|0,(y-half+s*.35)|0,1,1);
      ctx.fillRect((x-half+s*.65)|0,(y-half+s*.35)|0,1,1);
      if(e.isBoss){
        ctx.fillStyle='#ffd54a';
        ctx.fillRect(x-half-2,y-half-3,3,3);ctx.fillRect(x+half-1,y-half-3,3,3);
        ctx.fillStyle='#fff';ctx.fillRect(x-3,y+2,6,1);
      }
    }
    else if(e.type==='runner'){
      const lean=Math.sin(e.bob*2)*1;
      ctx.fillStyle=c2;ctx.beginPath();
      ctx.moveTo(x+lean,y-half);ctx.lineTo(x+half,y);ctx.lineTo(x+lean,y+half);ctx.lineTo(x-half,y);
      ctx.closePath();ctx.fill();
      ctx.fillStyle=c1;ctx.fillRect(x-1+lean,y-2,2,2);
      ctx.fillStyle='#fff';ctx.fillRect(x-2+lean,y-3,1,1);
    }
    else if(e.type==='tank'){
      ctx.fillStyle=c2;ctx.fillRect(x-half,y-half+1,s,s-1);
      ctx.fillStyle=c1;ctx.fillRect(x-half+1,y-half+2,s-2,3);
      ctx.fillStyle='#222';
      ctx.fillRect(x-half-1,y-half+3,2,s-4);ctx.fillRect(x+half-1,y-half+3,2,s-4);
      ctx.fillStyle='#000';ctx.fillRect(x-half+3,y-1,s-6,2);
      ctx.fillStyle='#600';ctx.fillRect(x-half+3,y,s-6,1);
    }
    else if(e.type==='swarm'){
      ctx.fillStyle=c2;ctx.beginPath();ctx.arc(x,y,half,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c1;ctx.beginPath();ctx.arc(x-1,y-1,half-1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.fillRect(x-1,y-1,1,1);
      const wig=Math.sin(e.bob)*.5;ctx.fillStyle=c2;
      ctx.fillRect(x-half-1+wig,y,1,2);ctx.fillRect(x+half-wig,y,1,2);
    }
    else if(e.type==='shielded'){
      ctx.fillStyle=c2;ctx.fillRect(x-half,y-half,s,s);
      ctx.fillStyle=c1;ctx.fillRect(x-half+1,y-half+1,s-2,3);
      ctx.fillStyle='#000';ctx.fillRect(x-half+3,y-half+4,2,2);ctx.fillRect(x+half-5,y-half+4,2,2);
      ctx.fillStyle='#fff';ctx.fillRect(x-half+3,y-half+4,1,1);ctx.fillRect(x+half-5,y-half+4,1,1);
      if(e.shield>0){
        const pul=.5+.5*Math.sin(performance.now()/200);
        ctx.strokeStyle=`rgba(180,210,255,${.5+pul*.4})`;ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(x,y,half+3,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(180,210,255,${.2+pul*.2})`;
        ctx.beginPath();ctx.arc(x,y,half+2,0,Math.PI*2);ctx.fill();
      }
    }
    else if(e.type==='healer'){
      ctx.fillStyle=c2;ctx.beginPath();ctx.arc(x,y,half,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c1;ctx.beginPath();ctx.arc(x-1,y-1,half-1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(x-half+3,y-1,s-6,2);ctx.fillRect(x-1,y-half+3,2,s-6);
      const pul=.5+.5*Math.sin(performance.now()/300);
      ctx.strokeStyle=`rgba(255,180,220,${.3+pul*.4})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,half+4+pul*4,0,Math.PI*2);ctx.stroke();
    }
    else if(e.type==='phantom'){
      ctx.fillStyle=c2;ctx.fillRect(x-half,y-half+3,s,s-3);
      ctx.beginPath();ctx.arc(x,y-half+3,half,Math.PI,0);ctx.fill();
      const wig=Math.sin(e.bob)*1.5;ctx.fillStyle=c2;
      ctx.fillRect(x-half,y+half,3,2-((e.bob*2|0)%2));
      ctx.fillRect(x-half+5+wig,y+half,3,2);
      ctx.fillRect(x-half+10,y+half,3,2-((e.bob*3|0)%2));
      ctx.fillRect(x+half-3-wig,y+half,3,2);
      ctx.fillStyle='#fff';ctx.fillRect(x-4,y-1,3,3);ctx.fillRect(x+1,y-1,3,3);
      ctx.fillStyle=c1;ctx.fillRect(x-3,y,1,1);ctx.fillRect(x+2,y,1,1);
    }
    else if(e.type==='hivemind'){
      ctx.fillStyle=c2;ctx.fillRect(x-half,y-half,s,s);
      ctx.fillStyle=c1;
      for(let i=0;i<3;i++)for(let j=0;j<3;j++)if((i+j)%2===0)ctx.fillRect(x-half+2+i*7,y-half+2+j*7,5,5);
      ctx.fillStyle='#ffea44';ctx.fillRect(x-4,y-4,3,3);ctx.fillRect(x+1,y-4,3,3);
      ctx.fillStyle='#000';ctx.fillRect(x-3,y-3,1,1);ctx.fillRect(x+2,y-3,1,1);
    }
    ctx.globalAlpha=1;
    const hpR=Math.max(0,e.hp/e.maxHp);
    const barW=s+(e.isBoss?28:2);
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(x-barW/2-1,y-half-5,barW+2,4);
    ctx.fillStyle=hpR>.5?'#5cdb95':hpR>.25?'#ffd54a':'#ff7b8e';
    ctx.fillRect(x-barW/2,y-half-4,barW*hpR,2);
    if(e.shield>0){ctx.fillStyle='#bcd6ff';ctx.fillRect(x-barW/2,y-half-7,barW*(e.shield/e.maxShield),2);}
    if(e.slow>0){ctx.fillStyle='#5dd5e8';ctx.fillRect(x-2,y+half+1,1,2);ctx.fillRect(x+1,y+half+1,1,2);}
    if(e.dot>0){ctx.fillStyle='#9bd166';ctx.fillRect(x+(performance.now()/100|0)%s-half,y-half-1,1,1);}
  }
};

// ============================================================
// GAME STATE
// ============================================================
const Game = {
  state:'menu',saveData:null,passives:{},
  // run
  mapDef:null,chosenClass:null,
  stats:null, // run-time multipliers
  items:[],   // bought items (with stack count)
  relics:[],  // legacy relic display (using same items system)
  hoverTile:null,selectedTowerType:null,selectedPlaced:null,
  towers:[],enemies:[],projectiles:[],particles:[],texts:[],lightnings:[],rings:[],
  gold:0,lives:0,maxLives:0,startGold:0,startLives:0,maxRelics:6,sellRatio:.5,
  freeRerolls:0,shopChoices:4,bossBonus:0,
  wave:0,kills:0,goldEarned:0,
  speed:1,paused:false,combatTime:0,spawnQueue:[],betweenWaves:true,
  currentShop:null,shopBought:[],shopLocked:[],rerollsUsed:0,
  runWon:false,runEnded:false,metaEarned:0,
  flashScreen:0,bgPhase:0,guardianUsed:false,

  init(){
    this.saveData=Save.load();
    SFX.muted=!!this.saveData.muted;
    this.passives=this.computePassives();
    UI.init();
    this.setState('menu');
  },
  computePassives(){
    const p={startGold:CONFIG.startGold,startLives:CONFIG.startLives,maxRelics:CONFIG.startMaxRelics,sellRatio:.5,freeRerolls:0,shopChoices:4,globalDmg:1,bossBonus:0};
    for(const id of this.saveData.upgrades){const t=TREE.find(x=>x.id===id);if(t)t.apply(p);}
    return p;
  },
  defaultStats(){
    return {dmgMul:1,rangeMul:1,frMul:1,critChance:0,critDmgMul:1,splashMul:1,
      killGoldMul:1,flatGoldPerKill:0,extraChains:0,doubleShotChance:0,
      mintMul:1,poisonMul:1,slowMul:1,frostDmgMul:1,allSlow:0,
      itemDiscount:1,costMul:1,flatDmg:0,waveBonus:0,
      bossDmgMul:0,execute:0,frostFreeze:0,lifeSteal:0,singleDmgMul:1,
      hoardDmg:false,berserk:false,guardianAngel:false,freeLocks:false,epicDouble:false};
  },
  setState(s){this.state=s;UI.render();},

  startRun(mapDef){
    this.mapDef=mapDef;
    this.setState('classselect');
  },
  pickClass(cls){
    this.chosenClass=cls;
    this.beginCombat();
  },
  beginCombat(){
    this.passives=this.computePassives();
    this.gold=this.passives.startGold;this.lives=this.passives.startLives;
    this.maxLives=this.passives.startLives;this.maxRelics=this.passives.maxRelics;
    this.sellRatio=this.passives.sellRatio;this.shopChoices=this.passives.shopChoices;
    this.startGold=this.gold;this.startLives=this.lives;
    this.stats=this.defaultStats();
    this.items=[];this.relics=[];
    if(this.passives.globalDmg)this.stats.dmgMul*=this.passives.globalDmg;
    this.bossBonus=this.passives.bossBonus;
    this.freeRerolls=this.passives.freeRerolls;
    // Apply class
    if(this.chosenClass)this.chosenClass.apply(this);
    this.towers=[];this.enemies=[];this.projectiles=[];
    this.particles=[];this.texts=[];this.lightnings=[];this.rings=[];
    this.wave=0;this.kills=0;this.goldEarned=0;
    this.spawnQueue=[];this.betweenWaves=true;
    this.runEnded=false;this.runWon=false;this.guardianUsed=false;
    this.combatTime=0;this.speed=1;this.paused=false;
    this.selectedTowerType=null;this.selectedPlaced=null;
    this.setState('combat');
  },
  startNextWave(){
    if(!this.betweenWaves)return;
    this.wave++;this.betweenWaves=false;
    if(this.stats.waveBonus>0){
      this.gold+=this.stats.waveBonus;
      UI.toast('+'+this.stats.waveBonus+' wave bonus','gold');
    }
    const def=generateWave(this.wave,this.mapDef);
    this.spawnQueue=[];
    for(const grp of def.spawns){
      let st=grp.delay;
      for(let i=0;i<grp.count;i++){
        this.spawnQueue.push({t:st,type:grp.type,hpMul:grp.hpMul,speedMul:grp.speedMul,isBoss:grp.isBoss});
        st+=grp.gap;
      }
    }
    this.spawnQueue.sort((a,b)=>a.t-b.t);
    this.combatTime=0;SFX.click();
    if(this.wave===25)UI.banner('FINAL BOSS',2);
  },
  update(dt){
    this.bgPhase+=dt;
    if(this.state!=='combat')return;
    if(this.paused)return;
    dt*=this.speed;this.combatTime+=dt;
    if(this.flashScreen>0)this.flashScreen-=dt;
    if(!this.betweenWaves){
      while(this.spawnQueue.length&&this.spawnQueue[0].t<=this.combatTime){
        const s=this.spawnQueue.shift();
        const path=this.mapDef.paths[Math.floor(Math.random()*this.mapDef.paths.length)];
        this.enemies.push(new Enemy(s.type,path,s.hpMul,s.speedMul,s.isBoss));
      }
    }
    for(const t of this.towers)t.update(dt,this);
    for(const e of this.enemies)if(e.alive)e.update(dt,this);
    for(const p of this.projectiles)p.update(dt,this);
    for(const part of this.particles){part.x+=part.vx*dt;part.y+=part.vy*dt;part.vy+=80*dt;part.life-=dt;}
    for(const tx of this.texts){tx.y-=22*dt;tx.life-=dt;}
    for(const l of this.lightnings)l.time-=dt;
    for(const r of this.rings){r.r+=r.vr*dt;r.time-=dt;}
    this.projectiles=this.projectiles.filter(p=>p.alive);
    this.particles=this.particles.filter(p=>p.life>0);
    this.texts=this.texts.filter(t=>t.life>0);
    this.lightnings=this.lightnings.filter(l=>l.time>0);
    this.rings=this.rings.filter(r=>r.time>0);
    if(!this.betweenWaves&&!this.spawnQueue.length&&!this.enemies.some(e=>e.alive)){
      this.betweenWaves=true;
      if(this.wave>=25){this.runWon=true;this.endRun(true);}
      else{SFX.waveClear();UI.banner('Wave '+this.wave+' Clear',1.2,'good');this.openShop();}
    }
    if(this.lives<=0&&!this.runEnded)this.endRun(false);
  },
  endRun(won){
    this.runEnded=true;this.runWon=won;
    let earned=this.wave*5;if(won)earned+=50+this.bossBonus;
    this.metaEarned=earned;
    this.saveData.currency+=earned;this.saveData.stats.totalRuns++;
    this.saveData.stats.totalKills+=this.kills;
    this.saveData.stats.totalGold=(this.saveData.stats.totalGold||0)+Math.round(this.goldEarned);
    if(this.wave>this.saveData.stats.bestWave)this.saveData.stats.bestWave=this.wave;
    Save.save();
    if(won)SFX.win();else SFX.lose();
    setTimeout(()=>this.setState('summary'),700);
  },

  // ----- Shop -----
  rollShopChoice(){
    // Weighted rarity by wave number
    const w=this.wave;
    const weights={common:60-w*1.5,uncommon:25+w*.5,rare:10+w*.6,epic:5+w*.5,legendary:Math.max(0,w-12)};
    const total=Object.values(weights).reduce((a,b)=>a+Math.max(0,b),0);
    let r=Math.random()*total;let chosen='common';
    for(const k in weights){r-=Math.max(0,weights[k]);if(r<=0){chosen=k;break;}}
    const pool=ITEMS.filter(it=>it.rarity===chosen&&(it.stack||!this.items.some(x=>x.id===it.id)));
    if(pool.length===0){
      // fallback to any unowned
      const any=ITEMS.filter(it=>it.stack||!this.items.some(x=>x.id===it.id));
      return any[Math.floor(Math.random()*any.length)];
    }
    return pool[Math.floor(Math.random()*pool.length)];
  },
  itemPrice(item){
    let p=item.cost;
    p*=this.stats.itemDiscount;
    return Math.round(p);
  },
  openShop(){
    this.shopBought=[];
    this.currentShop=[];
    for(let i=0;i<this.shopChoices;i++)this.currentShop.push(this.rollShopChoice());
    this.shopLocked=this.shopLocked||[];
    this.rerollsUsed=0;
    this.setState('shop');
  },
  buyShop(idx){
    if(this.shopBought.includes(idx))return;
    const item=this.currentShop[idx];if(!item)return;
    const price=this.itemPrice(item);
    if(this.gold<price){UI.toast('Not enough gold','warn');return;}
    if(!item.stack&&this.items.some(x=>x.id===item.id)){UI.toast('Already owned','warn');return;}
    if(this.relics.length>=this.maxRelics){UI.toast('Relic slots full','warn');return;}
    this.gold-=price;
    this.items.push(item);
    this.relics.push(item);
    let applyFn=item.apply;
    applyFn(this);
    if(this.stats.epicDouble&&item.rarity==='epic')applyFn(this);
    this.shopBought.push(idx);
    SFX.buy();
    UI.render();
  },
  toggleLock(idx){
    if(!this.stats.freeLocks){
      // free locks are nice but not enforced; allow always for simplicity
    }
    const i=this.shopLocked.indexOf(idx);
    if(i>=0)this.shopLocked.splice(i,1);
    else this.shopLocked.push(idx);
    SFX.click();UI.render();
  },
  reroll(){
    const cost=this.rerollsUsed<this.freeRerolls?0:10+this.rerollsUsed*5;
    if(cost>0&&this.gold<cost){UI.toast('Not enough gold','warn');return;}
    this.gold-=cost;this.rerollsUsed++;
    const newShop=[];
    for(let i=0;i<this.currentShop.length;i++){
      if(this.shopLocked.includes(i)&&!this.shopBought.includes(i))newShop.push(this.currentShop[i]);
      else if(this.shopBought.includes(i))newShop.push(this.currentShop[i]);
      else newShop.push(this.rollShopChoice());
    }
    this.currentShop=newShop;
    SFX.click();UI.render();
  },
  continueShop(){
    this.currentShop=null;this.shopBought=[];this.shopLocked=[];
    this.setState('combat');
  },

  trySelectTower(type){
    if(!this.saveData.unlockedTowers.includes(type))return;
    const cost=Math.round(CONFIG.towers[type].cost*this.stats.costMul);
    if(this.gold<cost){UI.toast('Not enough gold','warn');return;}
    this.selectedTowerType=type;this.selectedPlaced=null;
    UI.dirty();
  },
  tryPlaceAt(gx,gy){
    if(!this.selectedTowerType)return false;
    if(!MapGen.isPlaceable(this.mapDef,gx,gy))return false;
    if(this.towers.some(t=>t.gx===gx&&t.gy===gy))return false;
    const cost=Math.round(CONFIG.towers[this.selectedTowerType].cost*this.stats.costMul);
    if(this.gold<cost){UI.toast('Not enough gold','warn');return false;}
    this.gold-=cost;
    const t=new Tower(this.selectedTowerType,gx,gy);t.totalSpend=cost;
    this.towers.push(t);SFX.place();
    this.selectedTowerType=null;UI.dirty();
    return true;
  },
  selectPlaced(gx,gy){
    const t=this.towers.find(t=>t.gx===gx&&t.gy===gy);
    if(t){this.selectedPlaced=t;this.selectedTowerType=null;UI.showTowerPopup(t);return true;}
    return false;
  },
  upgradeSelected(){
    const t=this.selectedPlaced;if(!t||t.tier>=2)return;
    const c=t.upgradeCost();if(this.gold<c){UI.toast('Not enough gold','warn');return;}
    this.gold-=c;t.tier++;t.totalSpend+=c;
    UI.showTowerPopup(t);
  },
  sellSelected(){
    const t=this.selectedPlaced;if(!t)return;
    const refund=Math.round(t.totalSpend*this.sellRatio);
    this.gold+=refund;
    this.towers=this.towers.filter(x=>x!==t);
    this.selectedPlaced=null;UI.hidePopup();
    UI.toast('+'+refund+' gold','gold');UI.dirty();
  },
  spawnParticles(x,y,color,count=8){
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2,s=30+Math.random()*60;
      this.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:.4+Math.random()*.4,color,size:1+Math.random()*2});
    }
  },
  spawnText(x,y,t,c){this.texts.push({x,y,text:t,color:c,life:1.2});},
  spawnRing(x,y,r){this.rings.push({x,y,r:0,vr:r*4,time:.25,maxR:r});},
  cycleSpeed(){this.speed=this.speed===1?2:this.speed===2?3:1;UI.dirty();},
  togglePause(){this.paused=!this.paused;UI.dirty();},
  toggleMute(){SFX.muted=!SFX.muted;this.saveData.muted=SFX.muted;Save.save();UI.dirty();}
};

// ============================================================
// RENDER
// ============================================================
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

const Render={
  draw(){
    const W=CONFIG.W,H=CONFIG.H;
    if(Game.state==='combat'||Game.state==='shop'){
      this.drawWorld(W,H);
      if(Game.flashScreen>0){ctx.fillStyle=`rgba(255,80,80,${Game.flashScreen})`;ctx.fillRect(0,0,W,H);}
    } else this.drawIdle(W,H);
  },
  drawIdle(W,H){
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0e1230');grad.addColorStop(1,'#070914');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    const t=performance.now()/1000;
    for(let i=0;i<60;i++){
      const x=((i*47+t*8)%W);
      const y=(i*31)%H;
      const b=(Math.sin(t*2+i)+1)*.3+.4;
      ctx.fillStyle=`rgba(220,220,255,${b})`;ctx.fillRect(x|0,y,1,1);
    }
    ctx.fillStyle='#0d1130';ctx.fillRect(0,H-44,W,44);
    for(let i=0;i<8;i++){
      const x=i*60+10;const h=24+(i%3)*10;
      ctx.fillStyle='#080a18';ctx.fillRect(x,H-44-h,18,h);
      ctx.fillStyle='#1d2244';ctx.fillRect(x+5,H-44-h-7,8,7);
      if((i+(t|0))%3===0){ctx.fillStyle='#ffd54a';ctx.fillRect(x+8,H-44-h+4,2,2);}
    }
    const gx=W/2+Math.sin(t*.5)*60;
    const rg=ctx.createRadialGradient(gx,H-30,0,gx,H-30,80);
    rg.addColorStop(0,'rgba(255,201,102,0.25)');rg.addColorStop(1,'rgba(255,201,102,0)');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  },
  drawWorld(W,H){
    const m=Game.mapDef;
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,m.bgGrad[0]);g.addColorStop(1,m.bgGrad[1]);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const gen=MapGen.tilesFor(m);const t=Game.bgPhase;
    for(let y=0;y<CONFIG.gridH;y++)for(let x=0;x<CONFIG.gridW;x++){
      this.drawTile(gen.tiles[y][x],x*CONFIG.tile,y*CONFIG.tile,m,x,y,t);
    }
    this.drawPathFlow(m,t);
    if(Game.selectedTowerType&&Game.hoverTile){
      const {gx,gy}=Game.hoverTile;
      const px=gx*CONFIG.tile,py=gy*CONFIG.tile;
      const valid=MapGen.isPlaceable(m,gx,gy)&&!Game.towers.some(t=>t.gx===gx&&t.gy===gy);
      ctx.fillStyle=valid?'rgba(92,219,149,0.28)':'rgba(255,123,142,0.28)';
      ctx.fillRect(px,py,CONFIG.tile,CONFIG.tile);
      ctx.strokeStyle=valid?'rgba(92,219,149,0.7)':'rgba(255,123,142,0.7)';
      ctx.lineWidth=1;ctx.strokeRect(px+.5,py+.5,CONFIG.tile-1,CONFIG.tile-1);
      if(valid){
        const r=CONFIG.towers[Game.selectedTowerType].range*Game.stats.rangeMul;
        ctx.fillStyle='rgba(255,255,255,0.04)';
        ctx.beginPath();ctx.arc(px+CONFIG.tile/2,py+CONFIG.tile/2,r,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.arc(px+CONFIG.tile/2,py+CONFIG.tile/2,r,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    if(Game.selectedPlaced){
      const tt=Game.selectedPlaced;const r=tt.getRange(Game);
      ctx.fillStyle='rgba(255,213,74,0.06)';
      ctx.beginPath();ctx.arc(tt.x,tt.y,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,213,74,0.6)';ctx.setLineDash([4,3]);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(tt.x,tt.y,r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      ctx.strokeStyle='rgba(255,213,74,0.8)';
      ctx.strokeRect(tt.gx*CONFIG.tile+.5,tt.gy*CONFIG.tile+.5,CONFIG.tile-1,CONFIG.tile-1);
    }
    for(const r of Game.rings){
      const a=Math.max(0,r.time/.25);
      ctx.strokeStyle=`rgba(255,136,112,${a})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    }
    for(const tw of Game.towers){
      ctx.save();const sc=1+Math.max(0,tw.placeAnim)*.4;
      Sprites.tower(ctx,tw.type,tw.x,tw.y,tw.tier,tw.angle,tw.muzzle,sc);
      if(tw.type==='buffer'){
        for(const t2 of Game.towers)if(t2!==tw&&Math.abs(t2.gx-tw.gx)<=1&&Math.abs(t2.gy-tw.gy)<=1){
          ctx.strokeStyle=`rgba(180,138,255,${.15+Math.abs(Math.sin(performance.now()/400))*.15})`;
          ctx.beginPath();ctx.moveTo(tw.x,tw.y);ctx.lineTo(t2.x,t2.y);ctx.stroke();
        }
      }
      ctx.restore();
    }
    for(const e of Game.enemies)if(e.alive)Sprites.enemy(ctx,e);
    this.drawProjectiles();
    for(const l of Game.lightnings){
      const a=l.time/.22;
      ctx.strokeStyle=`rgba(255,240,80,${a})`;ctx.lineWidth=2;ctx.beginPath();
      for(const seg of l.segs){
        ctx.moveTo(seg.a.x,seg.a.y);
        const steps=4;
        for(let i=1;i<=steps;i++){
          const t2=i/steps;
          const mx=seg.a.x+(seg.b.x-seg.a.x)*t2+(Math.random()-.5)*5;
          const my=seg.a.y+(seg.b.y-seg.a.y)*t2+(Math.random()-.5)*5;
          ctx.lineTo(mx,my);
        }
      }
      ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,200,${a*.7})`;ctx.lineWidth=1;ctx.stroke();
    }
    for(const p of Game.particles){
      const a=Math.min(1,p.life*1.5);
      ctx.fillStyle=p.color;ctx.globalAlpha=a;
      const sz=Math.max(1,p.size|0);
      ctx.fillRect(p.x|0,p.y|0,sz,sz);
    }
    ctx.globalAlpha=1;
    ctx.font='bold 9px "JetBrains Mono", monospace';ctx.textAlign='center';
    for(const tx of Game.texts){
      const a=Math.min(1,tx.life);ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillText(tx.text,tx.x|0,(tx.y|0)+1);
      ctx.fillStyle=tx.color;ctx.fillText(tx.text,tx.x|0,tx.y|0);
    }
    ctx.globalAlpha=1;ctx.textAlign='left';
    const vg=ctx.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  },
  drawTile(tile,px,py,m,gx,gy,t){
    if(tile.kind==='path'){
      ctx.fillStyle=m.pathColor2;ctx.fillRect(px,py,CONFIG.tile,CONFIG.tile);
      ctx.fillStyle=m.pathColor;ctx.fillRect(px+1,py+1,CONFIG.tile-2,CONFIG.tile-2);
      const sh=Math.sin(t*1.5+gx*.3+gy*.4)*.5+.5;
      ctx.fillStyle=`rgba(255,255,255,${.04+sh*.06})`;ctx.fillRect(px+1,py+1,CONFIG.tile-2,1);
      ctx.fillStyle=m.pathColor2;ctx.fillRect(px+((gx*7+gy*3)%5)+3,py+((gx*5+gy*2)%6)+3,2,2);
      ctx.fillRect(px+((gx*11+gy*7)%6)+8,py+((gx*3+gy*5)%7)+10,1,1);
    } else if(tile.kind==='grass'){
      ctx.fillStyle=tile.v&1?m.grassA:m.grassB;ctx.fillRect(px,py,CONFIG.tile,CONFIG.tile);
      ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(px,py+CONFIG.tile-2,CONFIG.tile,2);
      ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(px,py,CONFIG.tile,1);
      ctx.fillStyle=m.grassDots;
      if(tile.v===0){ctx.fillRect(px+3,py+15,2,2);ctx.fillRect(px+18,py+8,1,2);}
      else if(tile.v===1){ctx.fillRect(px+10,py+5,2,2);ctx.fillRect(px+14,py+18,1,2);}
      else if(tile.v===2){ctx.fillRect(px+5,py+20,1,1);ctx.fillRect(px+19,py+13,1,1);}
      else{ctx.fillRect(px+8,py+12,2,1);}
    } else if(tile.kind==='rock'){
      ctx.fillStyle=tile.v&1?m.grassA:m.grassB;ctx.fillRect(px,py,CONFIG.tile,CONFIG.tile);
      ctx.fillStyle='#3a3a48';ctx.fillRect(px+4,py+8,16,12);
      ctx.fillStyle=m.rockColor;ctx.fillRect(px+5,py+6,14,12);
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(px+5,py+6,14,2);
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(px+5,py+18,14,2);
    } else if(tile.kind==='decor'){
      ctx.fillStyle=tile.v&1?m.grassA:m.grassB;ctx.fillRect(px,py,CONFIG.tile,CONFIG.tile);
      if(tile.v===0){
        const sw=Math.sin(t*1.5+gx)*.5;
        ctx.fillStyle='#3a2410';ctx.fillRect(px+11,py+15,3,7);
        ctx.fillStyle=m.decorColor;ctx.fillRect(px+5+sw,py+4,14,12);
        ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(px+5+sw,py+4,14,2);
        ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(px+5+sw,py+14,14,2);
        ctx.fillStyle=m.grassDots;
        ctx.fillRect(px+8+sw,py+7,2,2);ctx.fillRect(px+14+sw,py+10,2,2);
      } else if(tile.v===1){
        ctx.fillStyle=m.decorColor;ctx.fillRect(px+4,py+10,16,10);ctx.fillRect(px+7,py+7,10,4);
        ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(px+4,py+10,16,2);
        ctx.fillStyle=m.grassDots;ctx.fillRect(px+8,py+13,2,2);ctx.fillRect(px+15,py+15,2,1);
      } else {
        ctx.fillStyle=m.rockColor;ctx.fillRect(px+9,py+5,6,16);ctx.fillRect(px+5,py+11,4,6);ctx.fillRect(px+15,py+11,4,6);
        ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(px+9,py+5,2,16);ctx.fillRect(px+5,py+11,1,6);ctx.fillRect(px+15,py+11,1,6);
      }
    }
  },
  drawPathFlow(m,t){
    for(const path of m.paths){
      let totalLen=0;const segLens=[];
      for(let i=0;i<path.length-1;i++){
        const a=path[i],b=path[i+1];
        const len=Math.hypot(b.x-a.x,b.y-a.y)*CONFIG.tile;
        segLens.push(len);totalLen+=len;
      }
      for(let i=0;i<8;i++){
        let d=((i/8)*totalLen+(t*15)%totalLen);
        let segIdx=0;
        while(segIdx<segLens.length-1&&d>segLens[segIdx]){d-=segLens[segIdx];segIdx++;}
        const a=path[segIdx],b=path[segIdx+1];
        const ratio=segLens[segIdx]?d/segLens[segIdx]:0;
        const x=(a.x+.5+(b.x-a.x)*ratio)*CONFIG.tile;
        const y=(a.y+.5+(b.y-a.y)*ratio)*CONFIG.tile;
        if(x<0||x>CONFIG.W)continue;
        ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(x|0,y|0,1,1);
      }
    }
  },
  drawProjectiles(){
    for(const p of Game.projectiles){
      for(let i=0;i<p.trail.length;i++){
        const tr=p.trail[i];if(tr.t<=0)continue;
        ctx.globalAlpha=Math.min(1,tr.t/.18)*.5;
        ctx.fillStyle=p.color;ctx.fillRect(tr.x|0,tr.y|0,2,2);
      }
      ctx.globalAlpha=1;
      const x=p.x|0,y=p.y|0;
      if(p.kind==='arrow'){
        ctx.save();ctx.translate(x,y);ctx.rotate(p.angle);
        ctx.fillStyle='#3a2410';ctx.fillRect(-5,0,10,1);
        ctx.fillStyle=p.color;ctx.fillRect(-4,-1,9,2);
        ctx.fillStyle='#fff';ctx.fillRect(3,-1,2,2);
        ctx.fillStyle='#3a2410';ctx.fillRect(-5,-2,1,5);
        ctx.restore();
      } else if(p.kind==='cannon'){
        ctx.fillStyle='#1a1a1a';ctx.fillRect(x-3,y-3,6,6);
        ctx.fillStyle='#3a3030';ctx.fillRect(x-2,y-3,4,2);
      } else if(p.kind==='ice'){
        ctx.fillStyle='#bff5ff';ctx.fillRect(x-2,y-2,4,4);
        ctx.fillStyle='#fff';ctx.fillRect(x-1,y-1,2,2);
      } else if(p.kind==='poison'){
        ctx.fillStyle=p.color;ctx.fillRect(x-2,y-2,4,4);
        ctx.fillStyle='#cfff80';ctx.fillRect(x-1,y-1,2,2);
      } else if(p.kind==='bullet'){
        ctx.save();ctx.translate(x,y);ctx.rotate(p.angle);
        ctx.fillStyle=p.color;ctx.fillRect(-3,-1,7,2);
        ctx.fillStyle='#fff';ctx.fillRect(2,-1,2,2);
        ctx.restore();
      }
    }
  }
};

// ============================================================
// UI
// ============================================================
const overlay=document.getElementById('overlay');
const popEl=document.getElementById('pop');
const deckEl=document.getElementById('deck');
const actionEl=document.getElementById('actionBar');
const runbarEl=document.getElementById('runbar');
const toastWrap=document.getElementById('toastWrap');
const hudWave=document.getElementById('hudWave');
const hudLives=document.getElementById('hudLives');
const hudGold=document.getElementById('hudGold');
const speedBtn=document.getElementById('speedBtn');
const pauseBtn=document.getElementById('pauseBtn');
const muteBtn=document.getElementById('muteBtn');
const menuBtn=document.getElementById('menuBtn');

const UI={
  // state caches for incremental updates
  _deckKey:'', _actionKey:'', _runbarKey:'', _controlsKey:'',
  init(){
    const ptCoords=e=>{
      const t=e.touches&&e.touches[0]||e.changedTouches&&e.changedTouches[0]||e;
      const rect=canvas.getBoundingClientRect();
      const cx=(t.clientX-rect.left)/rect.width*CONFIG.W;
      const cy=(t.clientY-rect.top)/rect.height*CONFIG.H;
      return {x:cx,y:cy};
    };
    canvas.addEventListener('pointermove',e=>{
      if(Game.state!=='combat')return;
      const c=ptCoords(e);
      if(c.x<0||c.y<0||c.x>=CONFIG.W||c.y>=CONFIG.H){Game.hoverTile=null;return;}
      Game.hoverTile={gx:Math.floor(c.x/CONFIG.tile),gy:Math.floor(c.y/CONFIG.tile)};
    });
    canvas.addEventListener('pointerleave',()=>{Game.hoverTile=null;});
    canvas.addEventListener('click',e=>{
      SFX.ensure();
      if(Game.state!=='combat')return;
      const c=ptCoords(e);
      if(c.x<0||c.y<0||c.x>=CONFIG.W||c.y>=CONFIG.H)return;
      const gx=Math.floor(c.x/CONFIG.tile),gy=Math.floor(c.y/CONFIG.tile);
      if(Game.selectedTowerType){
        if(!Game.tryPlaceAt(gx,gy)){
          if(!MapGen.isPlaceable(Game.mapDef,gx,gy)){Game.selectedTowerType=null;UI.dirty();}
        }
      } else {
        if(!Game.selectPlaced(gx,gy)){Game.selectedPlaced=null;UI.hidePopup();}
      }
    });
    canvas.addEventListener('contextmenu',e=>{e.preventDefault();Game.selectedTowerType=null;Game.selectedPlaced=null;UI.hidePopup();UI.dirty();});
    let lastTap=0;
    canvas.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<300)e.preventDefault();lastTap=now;});
    document.addEventListener('keydown',e=>{
      if(Game.state!=='combat'){if(e.key==='Escape')this.hide();return;}
      const towers=Game.saveData.unlockedTowers;
      if(e.key>='1'&&e.key<='9'){const i=+e.key-1;if(towers[i]){Game.trySelectTower(towers[i]);}}
      else if(e.key===' '){e.preventDefault();Game.togglePause();}
      else if(e.key==='+'||e.key==='='||e.key==='-')Game.cycleSpeed();
      else if(e.key==='m'||e.key==='M')Game.toggleMute();
      else if(e.key==='Escape'){Game.selectedTowerType=null;Game.selectedPlaced=null;UI.hidePopup();UI.dirty();}
      else if(e.key==='Enter'){if(Game.betweenWaves)Game.startNextWave();}
    });
    speedBtn.onclick=()=>{Game.cycleSpeed();SFX.click();};
    pauseBtn.onclick=()=>{Game.togglePause();SFX.click();};
    muteBtn.onclick=()=>{Game.toggleMute();SFX.click();};
    menuBtn.onclick=()=>{
      SFX.click();
      if(Game.state==='combat'){Game.paused=true;UI.dirty();this.showInGameMenu();}
      else this.hide();
    };
    document.addEventListener('click',e=>{
      if(!popEl.contains(e.target)&&!canvas.contains(e.target)&&Game.selectedPlaced){
        Game.selectedPlaced=null;UI.hidePopup();
      }
    });
    window.addEventListener('resize',()=>this.layoutPopup());
  },
  dirty(){this._deckKey='';this._actionKey='';this._runbarKey='';this._controlsKey='';},
  // Per-frame: only updates that need to happen every frame (text values, lightweight)
  syncFrame(){
    // HUD text
    if(Game.state==='combat'){
      hudWave.textContent=Game.wave+'/25';
      hudLives.textContent=Math.max(0,Game.lives|0);
      hudGold.textContent=Math.floor(Game.gold);
    }
    // Action: if mid-wave, update count text only
    if(Game.state==='combat'&&!Game.betweenWaves&&!Game.runEnded){
      const remaining=Game.spawnQueue.length+Game.enemies.filter(e=>e.alive).length;
      const sub=actionEl.querySelector('.act-sub');
      if(sub)sub.textContent=remaining+' enemies left';
    }
    // Update deck affordability
    if(Game.state==='combat'){
      const cards=deckEl.children;
      for(let i=0;i<cards.length;i++){
        const card=cards[i];const type=card.dataset.type;if(!type)continue;
        const baseCost=Math.round(CONFIG.towers[type].cost*Game.stats.costMul);
        const can=Game.gold>=baseCost;
        const sel=Game.selectedTowerType===type;
        card.classList.toggle('selected',sel);
        card.classList.toggle('disabled',!can&&!sel);
        const costEl=card.querySelector('.tower-cost');
        if(costEl){costEl.textContent='◇'+baseCost;costEl.classList.toggle('cant',!can);}
      }
    }
    // Controls reflect speed/pause/mute
    const ckey=Game.speed+'_'+Game.paused+'_'+SFX.muted;
    if(this._controlsKey!==ckey){
      this._controlsKey=ckey;
      speedBtn.textContent=Game.speed+'×';speedBtn.classList.toggle('on',Game.speed>1);
      pauseBtn.textContent=Game.paused?'▶':'II';pauseBtn.classList.toggle('on',Game.paused);
      muteBtn.textContent=SFX.muted?'✕':'♪';muteBtn.classList.toggle('on',!SFX.muted);
    }
  },
  // State-change rebuilds (cheap, only when state-key changes)
  rebuildDeck(){
    if(Game.state!=='combat'){deckEl.classList.add('empty');return;}
    deckEl.classList.remove('empty');
    const towers=Game.saveData.unlockedTowers;
    const key=towers.join(',');
    if(this._deckKey===key)return;
    this._deckKey=key;
    deckEl.innerHTML='';
    for(let i=0;i<towers.length;i++){
      const type=towers[i];
      const data=CONFIG.towers[type];
      const card=document.createElement('button');
      card.className='tower-card';card.dataset.type=type;
      const iconCanvas=document.createElement('canvas');
      iconCanvas.width=32;iconCanvas.height=32;
      const ic=iconCanvas.getContext('2d');ic.imageSmoothingEnabled=false;
      Sprites.tower(ic,type,16,18,0,-Math.PI/2,0,1.2);
      const iw=document.createElement('div');iw.className='tower-icon';iw.appendChild(iconCanvas);
      const name=document.createElement('div');name.className='tower-name';name.textContent=data.name;
      const cost=document.createElement('div');cost.className='tower-cost';
      card.append(iw,name,cost);
      card.onclick=()=>{Game.trySelectTower(type);SFX.click();};
      deckEl.appendChild(card);
    }
  },
  rebuildAction(){
    if(Game.state!=='combat'){actionEl.style.display='none';this._actionKey='';return;}
    actionEl.style.display='';
    const key=Game.runEnded?'ended':Game.betweenWaves?`wait_${Game.wave}`:`live_${Game.wave}`;
    if(this._actionKey===key)return;
    this._actionKey=key;
    if(Game.runEnded){actionEl.innerHTML='';return;}
    if(Game.betweenWaves&&Game.wave<25){
      const final=Game.wave===24;
      const label=Game.wave===0?'Start ▶':final?'Final Boss ▶':'Wave '+(Game.wave+1)+' ▶';
      actionEl.innerHTML=`<button class="btn primary pulse" id="nw">${label}</button>`;
      document.getElementById('nw').onclick=()=>{Game.startNextWave();SFX.click();};
    } else if(!Game.betweenWaves){
      actionEl.innerHTML=`<button class="btn" disabled><span>Wave ${Game.wave}</span> · <span class="act-sub">…</span></button>`;
    }
  },
  rebuildRunbar(){
    if(Game.state!=='combat'){runbarEl.style.display='none';this._runbarKey='';return;}
    runbarEl.style.display='';
    // Build relics+stats summary
    const relicsHtml=Game.relics.length===0
      ? '<div class="relics-row"></div>'
      : '<div class="relics-row">'+this._renderRelicPills()+'</div>';
    const cls=Game.chosenClass;
    const classPill=cls?`<div class="class-pill" title="${cls.desc}"><span class="swatch" style="background:${cls.color};box-shadow:0 0 8px ${cls.color}"></span>${cls.icon||''} ${cls.name}</div>`:'';
    const key=`${Game.relics.length}_${cls?cls.id:''}`;
    if(this._runbarKey===key)return;
    this._runbarKey=key;
    runbarEl.innerHTML=classPill+relicsHtml;
  },
  _renderRelicPills(){
    // group identical items, show count
    const counts={};
    for(const r of Game.relics){
      if(!counts[r.id])counts[r.id]={item:r,n:0};
      counts[r.id].n++;
    }
    return Object.values(counts).map(({item,n})=>
      `<div class="relic-pill r-${item.rarity}" title="${item.desc}">${item.name}${n>1?` <span class="x">×${n}</span>`:''}</div>`
    ).join('');
  },
  toast(msg,kind=''){
    const el=document.createElement('div');el.className='toast '+kind;el.textContent=msg;
    toastWrap.appendChild(el);setTimeout(()=>el.remove(),1900);
  },
  banner(msg,dur=1.5,kind=''){
    const wrap=document.getElementById('canvasWrap');
    const old=wrap.querySelector('.banner');if(old)old.remove();
    const b=document.createElement('div');b.className='banner';
    if(kind==='good')b.style.color='var(--green)',b.style.borderColor='var(--green)';
    b.textContent=msg;wrap.appendChild(b);
    setTimeout(()=>b.remove(),dur*1000);
  },
  showTowerPopup(t){
    const cost=t.upgradeCost();const sell=Math.round(t.totalSpend*Game.sellRatio);
    const data=CONFIG.towers[t.type];
    const dmg=t.getDmg(Game).toFixed(1);
    const range=Math.round(t.getRange(Game));
    const fr=t.getFireRate(Game).toFixed(2);
    popEl.innerHTML=`
      <div class="pop-name">
        <span style="color:${data.c1}">${data.name}</span>
        <span class="tier-dots">
          <span class="tier-dot ${t.tier>=0?'on':''}"></span>
          <span class="tier-dot ${t.tier>=1?'on':''}"></span>
          <span class="tier-dot ${t.tier>=2?'on':''}"></span>
        </span>
      </div>
      <div class="pop-stats">
        <div>DMG <span>${dmg}</span></div>
        <div>RNG <span>${range}</span></div>
        <div>RoF <span>${fr}/s</span></div>
        <div>Spent <span>${t.totalSpend}g</span></div>
      </div>
      <div class="pop-actions">
        <button class="btn primary" id="popUp" ${cost<0||Game.gold<cost?'disabled':''}>${cost<0?'Maxed':'Up ◇'+cost}</button>
        <button class="btn danger" id="popSell">Sell ◇${sell}</button>
      </div>`;
    popEl.classList.add('show');this.layoutPopup(t);
    document.getElementById('popUp').onclick=e=>{e.stopPropagation();SFX.click();Game.upgradeSelected();};
    document.getElementById('popSell').onclick=e=>{e.stopPropagation();SFX.click();Game.sellSelected();};
  },
  layoutPopup(t){
    if(!t)t=Game.selectedPlaced;if(!t)return;
    const wrap=document.getElementById('canvasWrap');
    const wrapRect=wrap.getBoundingClientRect();
    const cRect=canvas.getBoundingClientRect();
    const sx=(t.x/CONFIG.W)*cRect.width+(cRect.left-wrapRect.left);
    const sy=(t.y/CONFIG.H)*cRect.height+(cRect.top-wrapRect.top);
    const popH=popEl.offsetHeight,popW=popEl.offsetWidth;
    let left=sx+20,top=sy-popH/2;
    if(left+popW>wrapRect.width-8)left=sx-popW-20;
    if(left<8)left=Math.max(8,sx-popW/2);
    if(top<8)top=8;
    if(top+popH>wrapRect.height-8)top=wrapRect.height-popH-8;
    popEl.style.left=left+'px';popEl.style.top=top+'px';
  },
  hidePopup(){popEl.classList.remove('show');},
  show(html){overlay.innerHTML=html;overlay.classList.add('show');},
  hide(){overlay.classList.remove('show');overlay.innerHTML='';},
  render(){
    this.dirty();
    if(Game.state==='combat'){this.hide();this.hidePopup();this.rebuildDeck();this.rebuildAction();this.rebuildRunbar();return;}
    this.rebuildDeck();this.rebuildAction();this.rebuildRunbar();
    if(Game.state==='menu')return this.renderMenu();
    if(Game.state==='mapselect')return this.renderMapSelect();
    if(Game.state==='classselect')return this.renderClassSelect();
    if(Game.state==='shop')return this.renderShop();
    if(Game.state==='summary')return this.renderSummary();
    if(Game.state==='unlocks')return this.renderUnlocks();
    if(Game.state==='upgrades')return this.renderUpgrades();
    if(Game.state==='stats')return this.renderStats();
  },

  renderMenu(){
    const sd=Game.saveData;
    this.show(`<div class="sheet">
      <div class="title-art"><h1>TOWERFALL</h1></div>
      <div class="sub">A roguelite tower defense — pick a class, stack items, survive 25 waves</div>
      <div class="row" style="justify-content:center;"><div class="currency-pill">${sd.currency}</div></div>
      <div class="menu-buttons">
        <button class="btn primary" id="m-play">Play</button>
        <button class="btn" id="m-unlock">Unlock Lab</button>
        <button class="btn" id="m-up">Upgrade Tree</button>
        <button class="btn" id="m-stat">Stats</button>
      </div>
      <div class="sub tiny muted">Tap or click · 1-8 select tower · Space pause · M mute · Enter next wave</div>
    </div>`);
    document.getElementById('m-play').onclick=()=>{SFX.click();Game.setState('mapselect');};
    document.getElementById('m-unlock').onclick=()=>{SFX.click();Game.setState('unlocks');};
    document.getElementById('m-up').onclick=()=>{SFX.click();Game.setState('upgrades');};
    document.getElementById('m-stat').onclick=()=>{SFX.click();Game.setState('stats');};
  },
  renderMapSelect(){
    const sd=Game.saveData;
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Choose Map</h1>
      <div class="cards">`;
    for(const m of CONFIG.maps){
      const unlocked=sd.unlockedMaps.includes(m.id);
      const cost=UNLOCK_MAP_COST[m.id]||0;
      const preview=`<div class="icon" style="background:linear-gradient(180deg,${m.bgGrad[0]},${m.bgGrad[1]});width:96px;height:54px;border-radius:8px;position:relative;">
        <div style="position:absolute;top:50%;left:0;right:0;height:6px;background:${m.pathColor};transform:translateY(-50%);box-shadow:0 0 0 1px ${m.pathColor2};"></div>
        <div style="position:absolute;left:30%;top:30%;width:8px;height:8px;background:${m.grassDots};border-radius:2px;"></div>
        <div style="position:absolute;right:25%;bottom:20%;width:6px;height:6px;background:${m.decorColor};border-radius:1px;"></div>
      </div>`;
      html+=`<div class="card ${unlocked?'':'locked'}" data-map="${m.id}">
        ${preview}
        <div class="name">${m.name}</div>
        <div class="desc">${m.sub}</div>
        ${unlocked?'<span class="badge">Ready</span>':`<div class="cost">★ ${cost}</div>`}
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.querySelectorAll('.card[data-map]').forEach(el=>{
      el.onclick=()=>{
        const id=el.dataset.map;const m=CONFIG.maps.find(x=>x.id===id);
        if(sd.unlockedMaps.includes(id)){SFX.click();Game.startRun(m);}
        else{const c=UNLOCK_MAP_COST[id];
          if(sd.currency>=c){sd.currency-=c;sd.unlockedMaps.push(id);Save.save();SFX.place();this.render();}
          else this.toast('Not enough currency','warn');
        }
      };
    });
  },
  renderClassSelect(){
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="dim tiny">${Game.mapDef.name}</div>
      </div>
      <h1>Choose Class</h1>
      <div class="sub">Each has unique bonuses and tradeoffs</div>
      <div class="cards two">`;
    for(const c of CLASSES){
      html+=`<div class="card class-card" data-class="${c.id}" style="border-color:${c.color}66;">
        <div class="cls-icon" style="background:${c.color}22;border-color:${c.color}88;color:${c.color};">${c.icon}</div>
        <div class="name" style="color:${c.color}">${c.name}</div>
        <div class="desc">${c.desc}</div>
        <div class="pn">
          ${c.bonuses.map(b=>`<div class="b">+ ${b}</div>`).join('')}
          ${c.penalties.map(p=>`<div class="p">- ${p}</div>`).join('')}
        </div>
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('mapselect');};
    document.querySelectorAll('.card[data-class]').forEach(el=>{
      el.onclick=()=>{
        const c=CLASSES.find(x=>x.id===el.dataset.class);
        SFX.click();Game.pickClass(c);
      };
    });
  },
  renderShop(){
    const cost=Game.rerollsUsed<Game.freeRerolls?0:10+Game.rerollsUsed*5;
    let html=`<div class="sheet">
      <h1>Shop · Wave ${Game.wave} cleared</h1>
      <div class="sub">Buy as many items as you can afford · Gold: <b style="color:var(--gold)">${Math.floor(Game.gold)}</b> · Slots ${Game.relics.length}/${Game.maxRelics}</div>
      <div class="shop-row">`;
    for(let i=0;i<Game.currentShop.length;i++){
      const item=Game.currentShop[i];const price=Game.itemPrice(item);
      const can=Game.gold>=price;const bought=Game.shopBought.includes(i);
      const locked=Game.shopLocked.includes(i);
      const ic=item.rarity==='legendary'?'★':item.rarity==='epic'?'◆':item.rarity==='rare'?'●':item.rarity==='uncommon'?'▲':'■';
      html+=`<div class="shop-card r-${item.rarity} ${can?'':'cant'} ${bought?'bought':''}" data-i="${i}">
        <div class="ic" style="color:var(--r-${item.rarity})">${ic}</div>
        <div class="body">
          <div class="name">${item.name} <span class="tag r-${item.rarity}">${item.rarity}</span></div>
          <div class="desc">${item.desc}</div>
        </div>
        <div class="right">
          <div class="price ${can?'':'cant'}">◇${price}</div>
          <button class="lock ${locked?'on':''}" data-lock="${i}" title="Lock through reroll">${locked?'🔒':'🔓'}</button>
        </div>
      </div>`;
    }
    html+=`</div>
      <div class="row">
        <button class="btn" id="reroll">Reroll · ${cost===0?'FREE':cost+'g'}</button>
        <button class="btn primary" id="cont">Continue ▶</button>
      </div>
      ${Game.relics.length?`<h3>Inventory</h3><div class="relics-row" style="padding:8px 4px;">${this._renderRelicPills()}</div>`:''}
    </div>`;
    this.show(html);
    document.querySelectorAll('.shop-card[data-i]').forEach(el=>{
      el.onclick=e=>{if(e.target.closest('.lock'))return;Game.buyShop(+el.dataset.i);};
    });
    document.querySelectorAll('button[data-lock]').forEach(el=>{
      el.onclick=e=>{e.stopPropagation();Game.toggleLock(+el.dataset.lock);};
    });
    document.getElementById('reroll').onclick=()=>{Game.reroll();};
    document.getElementById('cont').onclick=()=>{SFX.click();Game.continueShop();};
  },
  renderSummary(){
    const won=Game.runWon;
    const html=`<div class="sheet">
      <h1 style="${won?'background:linear-gradient(180deg,#9bf0bd,#3aa572);':'background:linear-gradient(180deg,#ffacc0,#d14b65);'}-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">${won?'VICTORY':'DEFEAT'}</h1>
      <div class="sub">${Game.chosenClass?Game.chosenClass.name+' · '+Game.mapDef.name:''}</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="lbl">Wave</div><div class="val">${Game.wave}/25</div></div>
        <div class="stat-item"><div class="lbl">Kills</div><div class="val">${Game.kills}</div></div>
        <div class="stat-item"><div class="lbl">Gold Earned</div><div class="val">${Math.round(Game.goldEarned)}</div></div>
        <div class="stat-item"><div class="lbl">Towers</div><div class="val">${Game.towers.length}</div></div>
        <div class="stat-item"><div class="lbl">Items</div><div class="val">${Game.relics.length}</div></div>
        <div class="stat-item"><div class="lbl">Earned</div><div class="val" style="color:var(--gold)">★ ${Game.metaEarned}</div></div>
      </div>
      ${Game.relics.length?`<h3>Build</h3><div class="relics-row" style="padding:6px 4px;">${this._renderRelicPills()}</div>`:''}
      <div class="row">
        <button class="btn" id="menu">Main Menu</button>
        <button class="btn primary" id="again">Play Again</button>
      </div>
    </div>`;
    this.show(html);
    document.getElementById('again').onclick=()=>{SFX.click();Game.setState('mapselect');};
    document.getElementById('menu').onclick=()=>{SFX.click();Game.setState('menu');};
  },
  renderUnlocks(){
    const sd=Game.saveData;
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Unlock Lab</h1>
      <h3>Towers (always available in your deck)</h3>
      <div class="cards">`;
    for(const t of Object.keys(CONFIG.towers)){
      const data=CONFIG.towers[t];
      const owned=sd.unlockedTowers.includes(t);
      const c=(UNLOCK_TOWER_INFO[t]&&UNLOCK_TOWER_INFO[t].cost)||0;
      html+=`<div class="card ${owned?'owned':''}" data-tower="${t}">
        ${owned?'<span class="badge">Owned</span>':(c>0?`<span class="badge">★ ${c}</span>`:'<span class="badge">Owned</span>')}
        <div class="icon"><canvas width="44" height="44" data-tower="${t}"></canvas></div>
        <div class="name">${data.name}</div>
        <div class="desc">${data.desc}</div>
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.querySelectorAll('canvas[data-tower]').forEach(cv=>{
      const c=cv.getContext('2d');c.imageSmoothingEnabled=false;
      Sprites.tower(c,cv.dataset.tower,22,26,0,-Math.PI/2,0,1.6);
    });
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.querySelectorAll('.card[data-tower]').forEach(el=>{
      el.onclick=()=>{
        const id=el.dataset.tower;
        if(sd.unlockedTowers.includes(id))return;
        const c=UNLOCK_TOWER_INFO[id]?.cost||0;
        if(sd.currency>=c){sd.currency-=c;sd.unlockedTowers.push(id);Save.save();SFX.place();this.render();}
        else this.toast('Not enough currency','warn');
      };
    });
  },
  renderUpgrades(){
    const sd=Game.saveData;
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Upgrade Tree</h1>
      <div class="sub">Permanent buffs across all runs</div>
      <div class="col">`;
    for(const u of TREE){
      const bought=sd.upgrades.includes(u.id);
      html+=`<div class="upgrade-row ${bought?'bought':''}">
        <div><div class="name">${u.name}</div></div>
        <div>${bought?'<span style="color:var(--green);font-weight:800;">✓ Bought</span>':`<button class="btn primary" data-up="${u.id}">★ ${u.cost}</button>`}</div>
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.querySelectorAll('button[data-up]').forEach(el=>{
      el.onclick=()=>{
        const id=el.dataset.up;const u=TREE.find(x=>x.id===id);
        if(sd.currency>=u.cost){sd.currency-=u.cost;sd.upgrades.push(id);Save.save();SFX.place();
          Game.passives=Game.computePassives();this.render();}
        else this.toast('Not enough currency','warn');
      };
    });
  },
  renderStats(){
    const sd=Game.saveData;
    const html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Stats</h1>
      <div class="stats-grid">
        <div class="stat-item"><div class="lbl">Best Wave</div><div class="val">${sd.stats.bestWave}</div></div>
        <div class="stat-item"><div class="lbl">Total Runs</div><div class="val">${sd.stats.totalRuns}</div></div>
        <div class="stat-item"><div class="lbl">Total Kills</div><div class="val">${sd.stats.totalKills}</div></div>
        <div class="stat-item"><div class="lbl">Total Gold</div><div class="val">${sd.stats.totalGold||0}</div></div>
        <div class="stat-item"><div class="lbl">Towers</div><div class="val">${sd.unlockedTowers.length}/${Object.keys(CONFIG.towers).length}</div></div>
        <div class="stat-item"><div class="lbl">Maps</div><div class="val">${sd.unlockedMaps.length}/${CONFIG.maps.length}</div></div>
        <div class="stat-item"><div class="lbl">Upgrades</div><div class="val">${sd.upgrades.length}/${TREE.length}</div></div>
        <div class="stat-item"><div class="lbl">Items in pool</div><div class="val">${ITEMS.length}</div></div>
      </div>
      <div class="row"><button class="btn danger" id="reset">Reset Save Data</button></div>
    </div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.getElementById('reset').onclick=()=>{
      if(confirm('Reset all save data?')){
        try{localStorage.removeItem(Save.KEY);}catch(e){}
        Save.data=null;Game.saveData=Save.load();
        Game.passives=Game.computePassives();this.render();
      }
    };
  },
  showInGameMenu(){
    this.show(`<div class="sheet" style="max-width:340px;">
      <h1>Paused</h1>
      <div class="menu-buttons">
        <button class="btn primary" id="resume">Resume</button>
        <button class="btn" id="restart">Surrender Run</button>
        <button class="btn ghost" id="quit">Quit to Menu</button>
      </div>
    </div>`);
    document.getElementById('resume').onclick=()=>{SFX.click();Game.paused=false;UI.dirty();this.hide();};
    document.getElementById('restart').onclick=()=>{SFX.click();if(confirm('End this run?')){Game.endRun(false);}};
    document.getElementById('quit').onclick=()=>{SFX.click();if(confirm('Quit run? No currency awarded.')){Game.runEnded=true;Game.metaEarned=0;this.hide();Game.setState('menu');}};
  }
};

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=performance.now(),acc=0;
const STEP=1/60;
function frame(now){
  const dt=Math.min(.1,(now-lastTime)/1000);
  lastTime=now;acc+=dt;
  let steps=0;
  while(acc>=STEP&&steps<5){Game.update(STEP);acc-=STEP;steps++;}
  Render.draw();
  UI.syncFrame();
  if(Game.state==='combat'&&Game.selectedPlaced)UI.layoutPopup(Game.selectedPlaced);
  requestAnimationFrame(frame);
}

Game.init();
requestAnimationFrame(frame);

</script>
