<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SPRAWL — A Cyberpunk Gamebook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --bg: #050508;
    --surface: #0a0a12;
    --border: #1a1a2e;
    --cyan: #00f5ff;
    --magenta: #ff006e;
    --yellow: #ffd60a;
    --green: #39ff14;
    --text: #c8d6e5;
    --muted: #4a5568;
    --glow-cyan: 0 0 10px #00f5ff, 0 0 30px #00f5ff44;
    --glow-mag: 0 0 10px #ff006e, 0 0 30px #ff006e44;
    --glow-green: 0 0 8px #39ff14, 0 0 20px #39ff1444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
    margin-top: 20px;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    animation: flicker 8s infinite;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--magenta);
    letter-spacing: 0.3em;
    margin-top: 8px;
    text-shadow: var(--glow-mag);
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: var(--glow-green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Story panel */
  .story-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    padding: 32px 36px;
    position: relative;
    margin-bottom: 24px;
    min-height: 200px;
  }

  .story-panel::before {
    content: attr(data-page);
    position: absolute;
    top: -1px;
    right: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    background: var(--cyan);
    color: var(--bg);
    padding: 2px 10px;
    letter-spacing: 0.2em;
  }

  .story-text {
    line-height: 1.85;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
  }

  .story-text p + p {
    margin-top: 16px;
  }

  /* Loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    gap: 16px;
  }

  .loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 1.2s infinite;
  }

  @keyframes scan {
    to { left: 100%; }
  }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.3em;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Choices */
  .choices-section {
    margin-top: 8px;
  }

  .choices-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--magenta);
    letter-spacing: 0.3em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .choices-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--magenta), transparent);
    opacity: 0.4;
  }

  .choice-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    color: var(--text);
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    position: relative;
    transition: all 0.2s ease;
    line-height: 1.5;
  }

  .choice-btn:hover:not(:disabled) {
    border-left-color: var(--cyan);
    border-color: var(--cyan);
    color: #fff;
    background: rgba(0, 245, 255, 0.04);
    box-shadow: inset 0 0 20px rgba(0,245,255,0.05), var(--glow-cyan);
    transform: translateX(4px);
  }

  .choice-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .choice-num {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--cyan);
    margin-right: 12px;
    opacity: 0.7;
  }

  /* History toggle */
  .history-section {
    margin-top: 30px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .history-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }

  .history-toggle:hover { color: var(--cyan); }

  .history-entries {
    display: none;
    margin-top: 16px;
    gap: 16px;
    flex-direction: column;
  }

  .history-entries.open { display: flex; }

  .history-entry {
    border-left: 2px solid var(--border);
    padding-left: 16px;
    opacity: 0.5;
  }

  .history-choice-made {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }

  .history-snippet {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Intro screen */
  .intro-screen {
    text-align: center;
    padding: 40px 20px;
  }

  .intro-screen p {
    max-width: 560px;
    margin: 0 auto 24px;
    line-height: 1.8;
    font-weight: 300;
    color: #8899aa;
  }

  .start-btn {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--bg);
    background: var(--cyan);
    border: none;
    padding: 14px 40px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.2s;
    box-shadow: var(--glow-cyan);
  }

  .start-btn:hover {
    background: #fff;
    box-shadow: 0 0 20px #fff, 0 0 40px var(--cyan);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  /* Corner decorations */
  .corner-tl, .corner-br {
    position: fixed;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--border);
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 10;
  }

  .corner-tl { top: 12px; left: 16px; }
  .corner-br { bottom: 12px; right: 16px; }

  /* Error */
  .error-box {
    border: 1px solid var(--magenta);
    padding: 16px 20px;
    background: rgba(255,0,110,0.05);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--magenta);
    letter-spacing: 0.1em;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="corner-tl">NEON_SPRAWL.EXE // v2.1.7</div>
<div class="corner-br">MATRIX_UPLINK // ACTIVE</div>

<div class="container">
  <header class="header">
    <div class="title">NEON SPRAWL</div>
    <div class="subtitle">▸ AN INTERACTIVE CYBERPUNK GAMEBOOK ◂</div>
  </header>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span id="status-text">NEURAL LINK ESTABLISHED</span>
    </div>
    <span id="page-counter">PAGE 0</span>
    <span id="timestamp"></span>
  </div>

  <div id="app"></div>

  <div class="history-section" id="history-section" style="display:none">
    <button class="history-toggle" onclick="toggleHistory()">
      <span>▸</span> TRANSMISSION LOG (<span id="history-count">0</span> entries)
    </button>
    <div class="history-entries" id="history-entries"></div>
  </div>
</div>

<script>
// State
const state = {
  page: 0,
  history: [],
  conversationHistory: [],
  isLoading: false,
  historyOpen: false
};

// Timestamp
function updateTimestamp() {
  const now = new Date();
  const ts = now.toISOString().replace('T', ' ').substring(0,19) + ' UTC';
  document.getElementById('timestamp').textContent = ts;
}
updateTimestamp();
setInterval(updateTimestamp, 1000);

// System prompt for Claude
const SYSTEM_PROMPT = `You are the narrator of "Neon Sprawl," a choose-your-own-adventure gamebook set in a dark cyberpunk world inspired by William Gibson's Neuromancer. 

The world: A sprawling future megacity called The Stack, where corporations rule, the matrix (called "the Weave") is accessed via neural jacks, street samurai and console cowboys scrape by in neon-soaked slums, while AIs and megacorps war in the digital shadows. Themes: betrayal, identity, survival, the blurring of human and machine.

RULES:
- Write vivid, atmospheric prose. 2–4 short paragraphs per page. Be cinematic and tense.
- End EVERY response with EXACTLY 3 choices, formatted as a JSON block at the very end like this:
{"choices":["Choice text one","Choice text two","Choice text three"]}
- Choices should be meaningfully different and reflect actual branching paths.
- Track the player's decisions and build a coherent narrative. Remember past choices.
- Keep the tone: gritty, noir, tense, darkly beautiful. No sanitized language.
- The story should feel dangerous. Stakes are real. Player can fail (but offer a way back).
- Page numbers: start at 1 and increment each turn.
- Include sensory details: rain, neon, static, chrome, the smell of ozone.
- Introduce memorable characters: fixers, AIs, corp-sec, hackers, street ronin.

When the player makes a choice, begin the next page by briefly acknowledging it (woven into the narrative), then advance the story. Never break character.`;

function parseResponse(text) {
  const jsonMatch = text.match(/\{"choices":\[[\s\S]*?\]\}/);
  let choices = [];
  let storyText = text;
  
  if (jsonMatch) {
    try {
      const parsed = JSON.parse(jsonMatch[0]);
      choices = parsed.choices || [];
      storyText = text.substring(0, jsonMatch.index).trim();
    } catch(e) {
      // fallback: try to extract choices from numbered list
      const lines = text.split('\n');
      storyText = '';
      lines.forEach(line => {
        const m = line.match(/^[1-3][.)]\s+(.+)/);
        if (m) choices.push(m[1].trim());
        else storyText += line + '\n';
      });
      storyText = storyText.trim();
    }
  }
  
  return { storyText, choices };
}

function formatStoryText(text) {
  return text.split('\n\n')
    .filter(p => p.trim())
    .map(p => `<p>${p.trim()}</p>`)
    .join('');
}

async function callClaude(userMessage) {
  state.conversationHistory.push({ role: 'user', content: userMessage });
  
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: state.conversationHistory
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const assistantText = data.content?.[0]?.text || '';
  state.conversationHistory.push({ role: 'assistant', content: assistantText });
  return assistantText;
}

function renderLoading() {
  return `
    <div class="story-panel" data-page="LOADING">
      <div class="loading">
        <div class="loading-bar"></div>
        <div class="loading-text">RENDERING NEURAL FEED...</div>
      </div>
    </div>`;
}

function renderStory(storyText, choices, pageNum) {
  const choiceBtns = choices.map((c, i) => `
    <button class="choice-btn fade-in" style="animation-delay:${0.1 + i * 0.1}s"
      onclick="makeChoice(${i}, \`${c.replace(/`/g, "'")}\`)">
      <span class="choice-num">[0${i+1}]</span>${c}
    </button>`).join('');

  return `
    <div class="story-panel fade-in" data-page="PAGE ${pageNum}">
      <div class="story-text">${formatStoryText(storyText)}</div>
    </div>
    ${choices.length ? `
    <div class="choices-section fade-in">
      <div class="choices-label">CHOOSE YOUR PATH</div>
      ${choiceBtns}
    </div>` : ''}`;
}

function renderError(msg) {
  return `<div class="error-box">// ERROR: ${msg}<br>// Retry or check connection.</div>
    <button class="choice-btn" style="margin-top:12px" onclick="retryLast()"><span class="choice-num">[!]</span> RETRY LAST ACTION</button>`;
}

function renderIntro() {
  return `
    <div class="story-panel fade-in" data-page="BOOT SEQUENCE">
      <div class="intro-screen">
        <p>The year is 2087. The megacity of <strong style="color:var(--cyan)">The Stack</strong> stretches from the poisoned coastline to the acid-rain highlands — forty million souls layered in chrome and concrete, plugged into the Weave, chasing the ghost of something human.</p>
        <p>You are a <strong style="color:var(--magenta)">street operator</strong>. A fixer. A ghost for hire. You live in the gap between the corporate towers and the flooded slums, running jobs that the clean-handed suits won't touch.</p>
        <p>Tonight, a job came in. A job that smells like trouble and pays like redemption. Your neural jack is charged. The Weave hums at the back of your skull.</p>
        <p style="color:var(--yellow);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.2em">JACK IN?</p>
        <button class="start-btn" onclick="startAdventure()">INITIALIZE</button>
      </div>
    </div>`;
}

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function updatePageCounter(n) {
  document.getElementById('page-counter').textContent = `PAGE ${n}`;
  document.getElementById('status-text').textContent = n === 0 ? 'NEURAL LINK ESTABLISHED' : `SECTOR ${n} // ACTIVE`;
}

let lastChoice = null;

async function startAdventure() {
  state.page = 1;
  updatePageCounter(1);
  render(renderLoading());
  
  try {
    const raw = await callClaude('Begin the story. Set the scene. Page 1.');
    const { storyText, choices } = parseResponse(raw);
    render(renderStory(storyText, choices, 1));
  } catch(e) {
    render(renderError(e.message));
  }
}

async function makeChoice(idx, choiceText) {
  // Save to history
  const currentStory = document.querySelector('.story-text')?.innerText || '';
  state.history.push({ choice: choiceText, snippet: currentStory.substring(0, 180) + '...' });
  lastChoice = choiceText;
  
  state.page++;
  updatePageCounter(state.page);
  
  // Disable buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  render(renderLoading());
  
  try {
    const raw = await callClaude(`I choose: "${choiceText}". Continue to page ${state.page}.`);
    const { storyText, choices } = parseResponse(raw);
    render(renderStory(storyText, choices, state.page));
    updateHistory();
  } catch(e) {
    render(renderError(e.message));
  }
}

async function retryLast() {
  if (!lastChoice) { startAdventure(); return; }
  render(renderLoading());
  try {
    const raw = await callClaude(`I choose: "${lastChoice}". Continue to page ${state.page}.`);
    const { storyText, choices } = parseResponse(raw);
    render(renderStory(storyText, choices, state.page));
  } catch(e) {
    render(renderError(e.message));
  }
}

function updateHistory() {
  const section = document.getElementById('history-section');
  const entries = document.getElementById('history-entries');
  const count = document.getElementById('history-count');
  
  if (state.history.length > 0) {
    section.style.display = 'block';
    count.textContent = state.history.length;
    entries.innerHTML = [...state.history].reverse().map((h, i) => `
      <div class="history-entry">
        <div class="history-choice-made">▸ CHOSE: ${h.choice}</div>
        <div class="history-snippet">${h.snippet}</div>
      </div>`).join('');
  }
}

function toggleHistory() {
  state.historyOpen = !state.historyOpen;
  document.getElementById('history-entries').className = 
    'history-entries' + (state.historyOpen ? ' open' : '');
}

// Boot
render(renderIntro());
</script>
</body>
</html>
