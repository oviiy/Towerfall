<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070914">
<title>Towerfall — Roguelite Defense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#070914; --bg-1:#10142a; --bg-2:#1a2040; --bg-3:#262d54;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.16);
  --text:#e9ecf7; --text-dim:#8590b5; --text-mute:#5b6688;
  --gold:#ffc966; --gold-bright:#ffe09a; --gold-deep:#c89545;
  --green:#5cdb95; --green-deep:#3aa572;
  --red:#ff7b8e; --red-deep:#d14b65;
  --cyan:#4ecdc4; --cyan-deep:#2a9189;
  --purple:#b48aff; --purple-deep:#7c5fcc;
  --xp:#5dafff;
  --r-com:#aab0c4; --r-unc:#5cdb95; --r-rare:#5dafff; --r-epic:#b48aff; --r-leg:#ffc966;
  --shadow-1:0 4px 14px rgba(0,0,0,.35);
  --shadow-2:0 10px 32px rgba(0,0,0,.5);
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;height:100dvh;background:var(--bg-deep);color:var(--text);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{
  background:
    radial-gradient(1200px 800px at 15% -10%,rgba(124,95,204,.18),transparent 60%),
    radial-gradient(900px 700px at 110% 100%,rgba(78,205,196,.10),transparent 55%),
    radial-gradient(800px 900px at 50% 110%,rgba(255,201,102,.06),transparent 60%),
    var(--bg-deep);
}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:transparent;}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

#app{position:relative;width:100%;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;padding:6px;gap:6px;z-index:1;}
@media(min-width:600px){#app{padding:10px;gap:8px;}}

/* HUD */
.hud{
  display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;
  padding:8px 10px;
  background:linear-gradient(180deg,rgba(38,45,84,.7),rgba(16,20,42,.55));
  border:1px solid var(--line);border-radius:var(--r-lg);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  box-shadow:var(--shadow-1);
}
.hud-brand{display:flex;align-items:center;gap:6px;font-weight:900;font-size:12px;letter-spacing:1px;}
.hud-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);}
.hud-stats{display:flex;justify-content:center;gap:10px;flex-wrap:nowrap;}
.hud-stat{display:flex;flex-direction:column;align-items:center;line-height:1;min-width:38px;}
.hud-stat .lbl{font-size:8.5px;font-weight:700;letter-spacing:1.1px;color:var(--text-mute);text-transform:uppercase;margin-bottom:3px;}
.hud-stat .val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800;letter-spacing:-.3px;}
.hud-stat.lives .val{color:var(--red);}
.hud-stat.gold .val{color:var(--gold);}
.hud-controls{display:flex;gap:4px;}
.icon-btn{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);color:var(--text);
  font-size:13px;font-weight:700;
  transition:transform .12s,background .15s,border-color .15s;
}
.icon-btn:hover{background:rgba(255,255,255,.08);border-color:var(--line-2);}
.icon-btn:active{transform:scale(.92);}
.icon-btn.on{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:var(--bg-deep);border-color:transparent;box-shadow:0 4px 12px rgba(255,201,102,.3);}

/* XP bar + level */
.xp-bar{
  position:relative;height:18px;
  background:linear-gradient(180deg,rgba(28,33,68,.6),rgba(16,20,42,.55));
  border:1px solid var(--line);border-radius:99px;
  overflow:hidden;display:flex;align-items:center;
  padding-left:34px;padding-right:10px;
  font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.5px;
}
.xp-bar .lvl{
  position:absolute;left:2px;top:1px;
  width:30px;height:14px;border-radius:99px;
  background:linear-gradient(180deg,var(--xp),#3a89dd);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
  text-shadow:0 1px 1px rgba(0,0,0,.5);
}
.xp-bar .fill{
  position:absolute;left:34px;right:0;top:0;bottom:0;
  background:linear-gradient(90deg,var(--xp),#7ab9ff);
  width:0%;transition:width .35s cubic-bezier(.2,.9,.3,1.1);
  opacity:.45;
}
.xp-bar .text{position:relative;z-index:1;font-family:'JetBrains Mono',monospace;}

/* Synergy bar */
.synergy-bar{
  display:flex;gap:4px;flex-wrap:wrap;align-items:center;
  padding:5px 8px;min-height:28px;
  background:linear-gradient(180deg,rgba(28,33,68,.5),rgba(16,20,42,.4));
  border:1px solid var(--line);border-radius:var(--r-md);
}
.synergy-bar:empty::before{content:'No towers yet';font-size:10px;color:var(--text-mute);font-style:italic;letter-spacing:.3px;}
.fam-pill{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  border-radius:99px;font-size:10px;font-weight:800;
  border:1px solid;letter-spacing:.3px;text-transform:uppercase;
}
.fam-pill .ic{font-size:11px;line-height:1;}
.fam-pill.dim{opacity:.5;}
.fam-pill.tier1{box-shadow:0 0 8px currentColor;}
.fam-pill.tier2{box-shadow:0 0 14px currentColor;background:rgba(255,255,255,0.08);}
.fam-bonus{font-size:9px;color:var(--text-dim);font-weight:600;}

/* Canvas wrap */
.canvas-wrap{
  position:relative;flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#0c1024,#070914);
  border:1px solid var(--line);border-radius:var(--r-lg);
  overflow:hidden;
  box-shadow:var(--shadow-2),inset 0 1px 0 rgba(255,255,255,.04);
}
.canvas-wrap::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 65%,rgba(0,0,0,.5));
  border-radius:inherit;
}
canvas{
  width:100%;height:100%;
  display:block;object-fit:contain;
  touch-action:none;
}

.banner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  padding:14px 28px;background:rgba(7,9,20,.85);
  border:2px solid var(--gold);border-radius:var(--r-md);
  font-weight:900;letter-spacing:2px;text-transform:uppercase;font-size:14px;
  color:var(--gold);
  box-shadow:0 0 30px rgba(255,201,102,.3),0 0 60px rgba(255,201,102,.15);
  backdrop-filter:blur(8px);pointer-events:none;
  animation:bIn .4s cubic-bezier(.2,.9,.3,1.2);
}
.banner.lvl{color:#fff;border-color:var(--xp);box-shadow:0 0 30px rgba(93,175,255,.5),0 0 60px rgba(93,175,255,.25);}
@keyframes bIn{from{opacity:0;transform:translate(-50%,-50%) scale(.7);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}

/* Action bar */
.action-bar{display:flex;gap:6px;}
.btn{
  flex:1;padding:14px 16px;border-radius:var(--r-md);
  font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  transition:transform .12s,box-shadow .15s,background .15s;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(38,45,84,.6),rgba(16,20,42,.55));
  backdrop-filter:blur(10px);color:var(--text);
}
.btn:hover{border-color:var(--line-2);}
.btn:active{transform:scale(.98);}
.btn.primary{
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  color:#1a1208;border:none;
  box-shadow:0 6px 18px rgba(255,201,102,.25),inset 0 1px 0 rgba(255,255,255,.4);
}
.btn.primary:hover{box-shadow:0 8px 26px rgba(255,201,102,.4),inset 0 1px 0 rgba(255,255,255,.4);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn.secondary{background:linear-gradient(180deg,rgba(92,219,149,.18),rgba(58,165,114,.1));border-color:rgba(92,219,149,.35);color:#bef0d4;}
.btn.danger{background:linear-gradient(180deg,rgba(255,123,142,.18),rgba(209,75,101,.1));border-color:rgba(255,123,142,.35);color:#ffc8d0;}
.btn.ghost{background:transparent;}
.btn.primary.pulse{animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 6px 18px rgba(255,201,102,.25),inset 0 1px 0 rgba(255,255,255,.4);}50%{box-shadow:0 6px 28px rgba(255,201,102,.55),inset 0 1px 0 rgba(255,255,255,.4);}}

/* Overlay */
#overlay{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(20,24,52,.85),rgba(7,9,20,.95));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:14px;z-index:50;animation:fIn .25s ease;
}
#overlay.show{display:flex;}
@keyframes fIn{from{opacity:0;}to{opacity:1;}}
.sheet{
  width:100%;max-width:520px;max-height:94dvh;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(180deg,rgba(28,33,68,.85),rgba(16,20,42,.85));
  border:1px solid var(--line-2);border-radius:var(--r-xl);
  padding:18px 16px;box-shadow:var(--shadow-2),inset 0 1px 0 rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:11px;
  scrollbar-width:thin;scrollbar-color:var(--bg-3) transparent;
  animation:sIn .3s cubic-bezier(.2,.9,.3,1.1);
}
@keyframes sIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
.sheet::-webkit-scrollbar{width:8px;}
.sheet::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:4px;}
.sheet h1{font-size:28px;font-weight:900;letter-spacing:-.5px;text-align:center;background:linear-gradient(180deg,var(--gold-bright),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
.sheet h2{font-size:18px;font-weight:800;letter-spacing:.3px;}
.sheet h3{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-top:4px;}
.sheet .sub{font-size:13px;color:var(--text-dim);text-align:center;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;}
.col{display:flex;flex-direction:column;gap:8px;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.cards.two{grid-template-columns:repeat(2,1fr);}
.cards.three{grid-template-columns:repeat(3,1fr);}
.card{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:12px 8px;
  background:linear-gradient(180deg,rgba(42,51,88,.5),rgba(28,33,68,.5));
  border:1px solid var(--line);border-radius:var(--r-md);
  text-align:center;cursor:pointer;
  transition:all .15s;user-select:none;
}
.card:hover{border-color:var(--line-2);transform:translateY(-2px);}
.card:active{transform:scale(.98);}
.card.selected{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,201,102,.16),rgba(255,201,102,.04));box-shadow:0 0 0 2px rgba(255,201,102,.2);}
.card.locked{opacity:.5;}
.card.owned{border-color:var(--green-deep);background:linear-gradient(180deg,rgba(92,219,149,.1),rgba(58,165,114,.04));}
.card .icon{
  width:48px;height:48px;border-radius:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(0,0,0,.2));
  border:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
}
.card .icon canvas{width:100%;height:100%;}
.card .name{font-size:13px;font-weight:800;letter-spacing:.3px;}
.card .desc{font-size:11px;color:var(--text-dim);line-height:1.35;}
.card .cost{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:var(--gold);}
.card .badge{position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:99px;background:rgba(0,0,0,.4);}
.card.owned .badge{background:var(--green-deep);color:#fff;}
.card.locked .badge{background:rgba(0,0,0,.5);color:var(--text-mute);}

.class-card{padding:13px 9px;align-items:center;gap:5px;border-width:2px;}
.class-card .name{font-size:13px;}
.class-card .cls-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;border:1px solid;}
.class-card .pn{display:flex;flex-direction:column;gap:1px;text-align:left;width:100%;font-size:10.5px;}
.class-card .b{color:var(--green);}
.class-card .p{color:var(--red);}

/* Shop card */
.shop-row{display:grid;grid-template-columns:1fr;gap:7px;}
.shop-card{
  position:relative;display:flex;align-items:center;gap:10px;
  padding:11px 11px;border:2px solid;border-radius:var(--r-md);
  background:linear-gradient(180deg,rgba(42,51,88,.5),rgba(28,33,68,.5));
  cursor:pointer;transition:all .15s;text-align:left;
}
.shop-card:hover{transform:translateY(-2px);}
.shop-card.r-common{border-color:rgba(170,176,196,.5);}
.shop-card.r-uncommon{border-color:rgba(92,219,149,.5);background:linear-gradient(180deg,rgba(92,219,149,.1),rgba(28,33,68,.5));}
.shop-card.r-rare{border-color:rgba(93,175,255,.5);background:linear-gradient(180deg,rgba(93,175,255,.1),rgba(28,33,68,.5));}
.shop-card.r-epic{border-color:rgba(180,138,255,.5);background:linear-gradient(180deg,rgba(180,138,255,.1),rgba(28,33,68,.5));}
.shop-card.r-legendary{border-color:rgba(255,201,102,.55);background:linear-gradient(180deg,rgba(255,201,102,.12),rgba(28,33,68,.5));}
.shop-card.cant{opacity:.55;}
.shop-card.bought{opacity:.3;cursor:default;}
.shop-card .ic{width:46px;height:46px;border-radius:8px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(255,255,255,0.06);overflow:hidden;}
.shop-card .ic canvas{width:100%;height:100%;}
.shop-card .body{flex:1;min-width:0;}
.shop-card .name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.shop-card .desc{font-size:11.5px;color:var(--text-dim);line-height:1.3;margin-top:2px;}
.shop-card .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.shop-card .price{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--gold);}
.shop-card .price.cant{color:var(--red);}
.shop-card .lock{
  width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-dim);
  border:1px solid var(--line);
}
.shop-card .lock.on{background:rgba(255,201,102,.2);color:var(--gold);border-color:var(--gold);}
.tag{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.4);color:var(--text-dim);}
.tag.r-common{color:#cdd2e0;}.tag.r-uncommon{color:var(--green);}.tag.r-rare{color:var(--cyan);}.tag.r-epic{color:var(--purple);}.tag.r-legendary{color:var(--gold);}
.tag.kind-tower{background:rgba(255,201,102,.2);color:var(--gold);}
.tag.kind-item{background:rgba(180,138,255,.18);color:var(--purple);}

.stat-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.stat-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px 1px 5px;border-radius:99px;background:rgba(0,0,0,.3);border:1px solid currentColor;font-size:10px;font-weight:800;letter-spacing:.4px;}
.stat-chip .ic{font-size:11px;line-height:1;}
.fam-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px 1px 5px;border-radius:99px;background:rgba(0,0,0,.4);border:1px solid currentColor;font-size:10px;font-weight:800;}

.stats-table{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;padding:9px;background:rgba(0,0,0,.25);border-radius:var(--r-md);border:1px solid var(--line);}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;}
.stat-row .lbl{color:var(--text-dim);}
.stat-row .val{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--text);}
.stat-row .val.pos{color:var(--green);}
.stat-row .val.neg{color:var(--red);}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-item{padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--r-md);}
.stat-item .lbl{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px;}
.stat-item .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;}

.currency-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:linear-gradient(180deg,rgba(255,201,102,.18),rgba(255,201,102,.06));border:1px solid rgba(255,201,102,.35);border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800;color:var(--gold-bright);}
.currency-pill::before{content:'★';color:var(--gold);}

.upgrade-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--r-md);font-size:13px;}
.upgrade-row.bought{background:linear-gradient(180deg,rgba(92,219,149,.1),rgba(58,165,114,.04));border-color:rgba(92,219,149,.3);}
.upgrade-row .name{font-weight:700;}
.upgrade-row button.btn{padding:6px 12px;font-size:11px;flex:none;}

#pop{
  position:absolute;display:none;
  background:linear-gradient(180deg,rgba(28,33,68,.95),rgba(16,20,42,.95));
  border:1px solid var(--line-2);border-radius:var(--r-md);
  padding:10px;min-width:200px;z-index:30;
  backdrop-filter:blur(12px);box-shadow:var(--shadow-2);
  animation:pIn .15s ease-out;
}
@keyframes pIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
#pop.show{display:flex;flex-direction:column;gap:8px;}
#pop .pop-name{font-size:13px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
#pop .tier-dots{display:inline-flex;gap:3px;}
#pop .tier-dot{width:6px;height:6px;border-radius:50%;background:var(--bg-3);}
#pop .tier-dot.on{background:var(--gold);box-shadow:0 0 6px var(--gold);}
#pop .pop-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;font-size:11px;color:var(--text-dim);}
#pop .pop-stats span{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:700;}
#pop .pop-actions{display:flex;gap:6px;}
#pop .pop-actions .btn{padding:8px 10px;font-size:11px;flex:1;}

.toast-wrap{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{padding:8px 16px;background:rgba(7,9,20,.92);border:1px solid var(--line-2);border-radius:99px;font-size:12px;font-weight:700;backdrop-filter:blur(8px);animation:tIn .25s,tOut .25s 1.7s forwards;}
.toast.warn{border-color:rgba(255,123,142,.5);color:var(--red);}
.toast.good{border-color:rgba(92,219,149,.5);color:var(--green);}
.toast.gold{border-color:rgba(255,201,102,.5);color:var(--gold);}
.toast.lvl{border-color:rgba(93,175,255,.5);color:var(--xp);}
@keyframes tIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes tOut{to{opacity:0;transform:translateY(-10px);}}

.title-art{position:relative;display:flex;align-items:center;justify-content:center;padding:14px 0 4px;}
.title-art h1{font-size:42px;letter-spacing:-1px;}
.menu-buttons{display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto;width:100%;}
.menu-buttons .btn{padding:14px;font-size:13px;}
.dim{color:var(--text-dim);}
.tiny{font-size:11px;}
.center{text-align:center;}
.muted{opacity:.6;}

.replace-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;}
.replace-cell{padding:8px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:var(--r-md);text-align:center;cursor:pointer;}
.replace-cell:hover{border-color:var(--gold);}

@media(max-width:380px){
  #app{padding:5px;gap:5px;}
  .hud{padding:6px 8px;}
  .hud-stats{gap:8px;}
  .hud-stat .val{font-size:13px;}
  .hud-brand{font-size:11px;}
  .icon-btn{width:30px;height:30px;border-radius:8px;font-size:12px;}
  .btn{padding:13px 12px;font-size:12px;}
  .sheet{padding:14px 11px;}
  .sheet h1{font-size:24px;}
}

const SFX = {
  ctx:null,muted:false,
  ensure(){if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}},
  beep(f,d,t='square',v=.08){
    if(this.muted)return;this.ensure();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=t;o.frequency.setValueAtTime(f,this.ctx.currentTime);
    g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,this.ctx.currentTime+d);
    o.connect(g).connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);
  },
  sweep(f1,f2,d,t='sawtooth',v=.1){
    if(this.muted)return;this.ensure();if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=t;
    o.frequency.setValueAtTime(f1,this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2,this.ctx.currentTime+d);
    g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,this.ctx.currentTime+d);
    o.connect(g).connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);
  },
  shoot(t){
    if(t==='archer'||t==='crossbow')this.beep(900,.04,'square',.05);
    else if(t==='cannon'||t==='mortar')this.beep(110,.18,'sawtooth',.15);
    else if(t==='sniper')this.beep(1700,.05,'square',.08);
    else if(t==='frost')this.beep(720,.07,'sine',.07);
    else if(t==='poison'||t==='plague')this.beep(330,.09,'triangle',.06);
    else if(t==='lightning')this.sweep(1200,200,.12,'sawtooth',.07);
    else if(t==='arcane')this.sweep(800,1400,.15,'sine',.08);
    else this.beep(660,.05,'square',.05);
  },
  hit(){this.beep(180,.06,'square',.05);},
  kill(){this.beep(140,.1,'sine',.08);},
  click(){this.beep(550,.04,'square',.04);},
  buy(){[440,660,880].forEach((f,i)=>setTimeout(()=>this.beep(f,.06,'square',.06),i*40));},
  waveClear(){[523,659,784].forEach((f,i)=>setTimeout(()=>this.beep(f,.1,'square',.08),i*100));},
  win(){[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>this.beep(f,.18,'square',.1),i*140));},
  lose(){this.sweep(440,55,.8,'sawtooth',.16);},
  place(){this.beep(440,.05,'square',.06);setTimeout(()=>this.beep(660,.05,'square',.06),50);},

};

const MapGen = {
  cache:{},
  tilesFor(m){
    if(this.cache[m.id])return this.cache[m.id];
    const tiles=[];
    for(let y=0;y<CONFIG.gridH;y++){tiles[y]=[];for(let x=0;x<CONFIG.gridW;x++)tiles[y][x]={kind:'grass',v:0};}
    const pathSet=new Set();
    for(const path of m.paths){
      for(let i=0;i<path.length-1;i++){
        const a=path[i],b=path[i+1];
        const dx=Math.sign(b.x-a.x),dy=Math.sign(b.y-a.y);
        let cx=a.x,cy=a.y;
        while(cx!==b.x||cy!==b.y){
          if(cx>=0&&cx<CONFIG.gridW&&cy>=0&&cy<CONFIG.gridH)pathSet.add(cy*CONFIG.gridW+cx);
          cx+=dx;cy+=dy;
        }
        if(cx>=0&&cx<CONFIG.gridW&&cy>=0&&cy<CONFIG.gridH)pathSet.add(cy*CONFIG.gridW+cx);
      }
    }
    const slotSet=new Set();
    for(const s of m.slots)slotSet.add(s.gy*CONFIG.gridW+s.gx);
    let seed=0;for(let i=0;i<m.id.length;i++)seed=(seed*31+m.id.charCodeAt(i))>>>0;
    const rnd=()=>{seed=(seed*1103515245+12345)>>>0;return seed/0xffffffff;};
    for(let y=0;y<CONFIG.gridH;y++)for(let x=0;x<CONFIG.gridW;x++){
      const k=y*CONFIG.gridW+x;
      if(pathSet.has(k))tiles[y][x]={kind:'path',v:0};
      else if(slotSet.has(k))tiles[y][x]={kind:'grass',v:0}; // ensure clear ground at slots
      else{const r=rnd();
        if(r<.06)tiles[y][x]={kind:'decor',v:Math.floor(rnd()*3)};
        else if(r<.13)tiles[y][x]={kind:'rock',v:Math.floor(rnd()*2)};
        else tiles[y][x]={kind:'grass',v:Math.floor(rnd()*4)};
      }
    }
    this.cache[m.id]={tiles,pathSet,slotSet};
    return this.cache[m.id];
  }
};

  if(num===18)return{spawns:[{type:mapDef.bossKey,count:1,delay:1.2,gap:1,isBoss:true,hpMul:1,speedMul:1}]};
  const w=num,spawns=[];
  const hpMul=1+(w-1)*.18,speedMul=1+Math.min(w-1,12)*.022;
  const E=(t,c,d=0,g=.7,h=hpMul,s=speedMul)=>spawns.push({type:t,count:c,delay:d,gap:g,hpMul:h,speedMul:s,isBoss:false});
  if(w===1)E('grunt',6,0,.85);
  else if(w===2){E('grunt',8,0,.7);E('runner',2,5,.5);}
  else if(w===3){E('runner',6,0,.5);E('grunt',6,4,.7);}
  else if(w===4){E('swarm',14,0,.25);E('grunt',5,5,.6);}
  else if(w===5){E('tank',1,0);E('grunt',10,2,.55);E('runner',4,8,.4);}
  else if(w===6){E('shielded',4,0,1);E('runner',8,4,.4);}
  else if(w===7){E('grunt',10,0,.55);E('shielded',4,5,1);E('tank',1,11);}
  else if(w===8){E('splitter',4,0,1);E('grunt',8,3,.55);}
  else if(w===9){E('healer',2,0,1);E('runner',12,2,.4);E('shielded',5,9,.7);}
  else if(w===10){E('brute',2,0,1.5);E('shielded',6,3,.7);E('swarm',16,8,.18);}
  else if(w===11){E('specter',5,0,.8);E('runner',10,3,.4);E('healer',2,8,1.5);}
  else if(w===12){E('tank',3,0,1.4);E('shielded',8,3,.55);E('splitter',5,9,1);}
  else if(w===13){E('brute',3,0,1.3);E('healer',2,3,1.5);E('runner',14,5,.32);E('shielded',5,12,.6);}
  else if(w===14){E('specter',8,0,.6);E('tank',3,4,1.3);E('healer',3,11,1.5);}
  else if(w===15){E('splitter',8,0,.7);E('shielded',12,5,.5);E('brute',3,12,1.3);}
  else if(w===16){E('tank',5,0,1.1);E('runner',18,3,.25);E('shielded',10,9,.5);E('healer',3,14,1.5);}
  else if(w===17){E('brute',5,0,1.1);E('specter',10,4,.5);E('tank',5,9,1.1);E('healer',3,15,1.5);E('splitter',6,18,.7);}
  return{spawns};
}

// ============================================================
class Enemy {
  constructor(type,path,hpMul,speedMul,isBoss){
    const data=isBoss?CONFIG.bosses[type]:CONFIG.enemies[type];
    this.type=type;this.isBoss=!!isBoss;
    this.maxHp=data.hp*hpMul;this.hp=this.maxHp;
    this.baseSpeed=data.speed*speedMul;this.gold=data.gold;this.xp=data.xp||1;
    this.c1=data.c1;this.c2=data.c2;this.size=data.size;
    this.shield=data.shield||0;this.maxShield=this.shield;
    this.heal=data.heal||0;this.dodgeChance=data.dodge||0;
    this.phase=data.phase||0;this.charge=data.charge||false;this.splits=data.splits||0;
    this.path=path;this.pathIdx=0;this.distAlong=0;
    this.x=(path[0].x+.5)*CONFIG.tile;this.y=(path[0].y+.5)*CONFIG.tile;
    this.alive=true;this.reachedBase=false;
    this.slow=0;this.slowTime=0;this.dot=0;this.dotTime=0;this.frozen=0;
    this.healCD=1;this.dodgeTimer=Math.random()*2;this.dodging=false;
    this.flash=0;this.lastSpawnHp=this.maxHp;this.facing=0;this.bob=Math.random()*Math.PI*2;
    this.chargeTimer=Math.random()*3;this.charging=false;
    this.pierceCount=0; // tracks pierces taken
  }
  update(dt,game){
    if(this.frozen>0){this.frozen-=dt;if(this.frozen>0)return;}
    if(this.slowTime>0){this.slowTime-=dt;if(this.slowTime<=0)this.slow=0;}
    if(this.dotTime>0){this.dotTime-=dt;this.takeDamage(this.dot*dt,game,true);if(!this.alive)return;}
    if(this.flash>0)this.flash-=dt;
    this.bob+=dt*4;
    if(this.type==='phantom'){
      this.dodgeTimer-=dt;
      if(this.dodgeTimer<=0){this.dodging=!this.dodging;this.dodgeTimer=this.dodging?1.2:1.8;}
    }
    if(this.charge){
      this.chargeTimer-=dt;
      if(this.chargeTimer<=0){this.charging=!this.charging;this.chargeTimer=this.charging?1.5:3;}
    }
    if(this.heal>0){
      this.healCD-=dt;
      if(this.healCD<=0){this.healCD=1.2;
        for(const e of game.enemies)if(e!==this&&e.alive&&Math.hypot(e.x-this.x,e.y-this.y)<80)e.hp=Math.min(e.maxHp,e.hp+this.heal);
      }
    }
    if(this.type==='hivemind'){
      if(this.maxHp-this.hp>(this.maxHp-this.lastSpawnHp)+90){
        this.lastSpawnHp=this.hp;
        for(let i=0;i<3;i++){
          const e=new Enemy('swarm',this.path,1,1.2,false);
          e.pathIdx=this.pathIdx;e.distAlong=Math.max(0,this.distAlong-12+i*4);
          game.enemies.push(e);
        }
      }
    }
    let speed=this.baseSpeed*(1-this.slow);
    if(this.charging)speed*=2.5;
    let rem=speed*dt;
    while(rem>0&&this.pathIdx<this.path.length-1){
      const a=this.path[this.pathIdx],b=this.path[this.pathIdx+1];
      const segLen=Math.hypot(b.x-a.x,b.y-a.y)*CONFIG.tile;
      const segRem=segLen-this.distAlong;
      if(rem<segRem){this.distAlong+=rem;rem=0;}
      else{rem-=segRem;this.pathIdx++;this.distAlong=0;}
    }
    if(this.pathIdx>=this.path.length-1){
      this.reachedBase=true;this.alive=false;
      game.lives-=this.isBoss?5:1;game.flashScreen=.4;
      if(game.lives<=0&&game.stats.guardianAngel&&!game.guardianUsed){
        game.guardianUsed=true;game.lives=5;game.maxLives=Math.max(game.maxLives,5);
        UI.toast('Guardian Angel! +5 lives','good');
      }
      return;
    }
    const a=this.path[this.pathIdx],b=this.path[this.pathIdx+1];
    const segLen=Math.hypot(b.x-a.x,b.y-a.y)*CONFIG.tile;
    const t=segLen?this.distAlong/segLen:0;
    const nx=(a.x+.5+(b.x-a.x)*t)*CONFIG.tile;
    const ny=(a.y+.5+(b.y-a.y)*t)*CONFIG.tile;
    this.facing=Math.atan2(ny-this.y,nx-this.x)||this.facing;
    this.x=nx;this.y=ny;
  }
  takeDamage(dmg,game,isDot=false){
    if(!this.alive)return;
    if(this.dodging&&!isDot){game.spawnText(this.x,this.y-12,'miss','#aaa');return;}
    if(this.phase>0&&!isDot)dmg*=(1-this.phase);
    if(game.stats.bossDmgMul&&this.isBoss)dmg*=game.stats.bossDmgMul;
    if(this.shield>0&&!isDot){const a=Math.min(this.shield,dmg);this.shield-=a;dmg-=a;}
    if(dmg<=0)return;
    this.hp-=dmg;this.flash=.08;
    if(game.stats.execute&&!isDot&&this.hp>0&&this.hp<this.maxHp*game.stats.execute&&!this.isBoss){
      this.hp=0;game.spawnText(this.x,this.y-14,'EXECUTE','#ff7b8e');
    }
    if(this.hp<=0){
      this.alive=false;
      let g=this.gold;g*=game.stats.killGoldMul;g+=game.stats.flatGoldPerKill;
      game.gold+=Math.round(g);game.kills++;game.goldEarned+=Math.round(g);
      // XP
      let xpGain=this.xp*(game.stats.xpMul||1);
      if(this.isBoss)xpGain*=(game.stats.bossXpMul||1);
      game.gainXp(xpGain);
      // life steal
      if(game.stats.lifeSteal>0&&Math.random()<game.stats.lifeSteal)
        game.lives=Math.min(game.lives+1,game.maxLives);
      // splitter
      if(this.splits>0){
        for(let i=0;i<this.splits;i++){
          const e=new Enemy('swarm',this.path,1,1,false);
          e.pathIdx=this.pathIdx;
          e.distAlong=Math.max(0,this.distAlong-2+i*2);
          game.enemies.push(e);
        }
      }
      // poison spread (Toxic synergy T2)
      if(game.stats.poisonSpread&&this.dot>0){
        for(const e of game.enemies)if(e!==this&&e.alive&&Math.hypot(e.x-this.x,e.y-this.y)<60){
          e.dot=Math.max(e.dot,this.dot);
          e.dotTime=Math.max(e.dotTime,2.5);
        }
      }
      game.spawnParticles(this.x,this.y,this.c1,this.isBoss?40:12);
      SFX.kill();
    }
  }
}

// PROJECTILE
// ============================================================
class Projectile {
  constructor(x,y,target,dmg,color,kind,props={}){
    this.x=x;this.y=y;this.target=target;this.dmg=dmg;this.color=color;this.kind=kind;this.props=props;
    this.alive=true;this.life=4;
    this.speed=kind==='bullet'?1100:kind==='arrow'?640:kind==='ice'?500:kind==='cannon'?420:kind==='mortar'?350:kind==='arcane'?420:560;
    this.angle=target?Math.atan2(target.y-y,target.x-x):0;
    this.tx=target?target.x:x;this.ty=target?target.y:y;
    this.trail=[];
    this.pierces=props.pierces||0;
    this.hitSet=new Set();
    this.homing=kind==='arcane';
  }
  update(dt,game){
    this.life-=dt;if(this.life<0){this.alive=false;return;}
    if(this.homing&&(!this.target||!this.target.alive)){
      // find new target
      let best=null,bd=200;
      for(const e of game.enemies)if(e.alive){
        const d=Math.hypot(e.x-this.x,e.y-this.y);if(d<bd){bd=d;best=e;}
      }
      this.target=best;
    }
    if(this.target&&this.target.alive){this.tx=this.target.x;this.ty=this.target.y;}
    this.trail.push({x:this.x,y:this.y,t:.18});
    if(this.trail.length>8)this.trail.shift();
    for(const tr of this.trail)tr.t-=dt;
    const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.hypot(dx,dy);
    if(d<6||d<this.speed*dt){this.hit(game);return;}
    this.angle=Math.atan2(dy,dx);
    this.x+=(dx/d)*this.speed*dt;this.y+=(dy/d)*this.speed*dt;
    // pierce: also check for enemies along path to current point
    if(this.pierces>0&&this.kind!=='cannon'&&this.kind!=='mortar'){
      for(const e of game.enemies)if(e.alive&&!this.hitSet.has(e)){
        if(Math.hypot(e.x-this.x,e.y-this.y)<e.size*.6){
          this.hitSet.add(e);e.takeDamage(this.dmg,game);
          this._applyExtras(e,game);
          this.pierces--;
          if(this.pierces<0){this.alive=false;return;}
        }
      }
    }
  }
  _applyExtras(target,game){
    if(game.stats.allSlow>0&&target&&target.alive&&this.kind!=='ice'){
      target.slow=Math.max(target.slow,game.stats.allSlow);
      target.slowTime=Math.max(target.slowTime,1.5);
    }
  }
  hit(game){
    if(this.kind==='cannon'||this.kind==='mortar'){
      const splash=this.props.splash||60;
      for(const e of game.enemies)if(e.alive&&Math.hypot(e.x-this.tx,e.y-this.ty)<splash){
        e.takeDamage(this.dmg,game);this._applyExtras(e,game);
      }
      game.spawnParticles(this.tx,this.ty,'#ffaa44',this.kind==='mortar'?32:24);
      game.spawnRing(this.tx,this.ty,splash);
    } else if(this.kind==='ice'){
      if(this.target&&this.target.alive){
        this.target.takeDamage(this.dmg,game);
        const slowAmt=this.props.slow*(game.stats.slowMul||1);
        this.target.slow=Math.max(this.target.slow,Math.min(.95,slowAmt));
        this.target.slowTime=Math.max(this.target.slowTime,this.props.slowDur);
        if(game.stats.frostFreeze)this.target.frozen=Math.max(this.target.frozen,game.stats.frostFreeze);
      }
    } else if(this.kind==='poison'){
      if(this.target&&this.target.alive){
        this.target.takeDamage(this.dmg,game);
        const dotV=this.props.dot;
        if(dotV>this.target.dot){this.target.dot=dotV;this.target.dotTime=this.props.dotDur;}
        else this.target.dotTime=Math.max(this.target.dotTime,this.props.dotDur);
        this._applyExtras(this.target,game);
      }
    } else {
      if(this.target&&this.target.alive){this.target.takeDamage(this.dmg,game);this._applyExtras(this.target,game);}
    }
    SFX.hit();
    this.alive=false;
  }
}

class Tower {
  constructor(type,gx,gy){
    const d=CONFIG.towers[type];
    this.type=type;this.fam=d.fam;this.gx=gx;this.gy=gy;
    this.x=(gx+.5)*CONFIG.tile;this.y=(gy+.5)*CONFIG.tile;
    this.tier=0;this.cooldown=Math.random()*.3;
    this.angle=Math.PI/2;this.totalSpend=d.cost;
    this.gpsTimer=0;this.muzzle=0;this.placeAnim=1;
  }
  isMagic(){return this.fam==='magic';}
  getDmg(g){
    const d=CONFIG.towers[this.type];
    let dmg=d.dmg*CONFIG.upgradeMul.dmg[this.tier];
    dmg+=g.stats.flatDmg||0;
    dmg*=g.stats.dmgMul;
    if(this.type==='frost'&&g.stats.frostDmgMul)dmg*=g.stats.frostDmgMul;
    if(this.isMagic()&&g.stats.magicMul)dmg*=g.stats.magicMul;
    if(g.passives.globalDmg)dmg*=g.passives.globalDmg;
    if(g.stats.berserk){
      const missing=1-(g.lives/Math.max(1,g.maxLives));
      dmg*=1+Math.min(.6,missing);
    }
    if(g.stats.hoardDmg){dmg*=1+Math.floor(g.gold/50)*.01;}
    if(g.stats.mercenary){
      let cnt=0;for(const k in g.familyCounts)if(g.familyCounts[k]>=2)cnt++;
      dmg*=1+g.stats.mercenary*cnt;
    }
    return dmg;
  }
  getRange(g){
    const d=CONFIG.towers[this.type];
    let r=d.range*CONFIG.upgradeMul.range[this.tier];
    r*=g.stats.rangeMul;
    return r;
  }
  getFireRate(g){
    const d=CONFIG.towers[this.type];
    let fr=d.fireRate*CONFIG.upgradeMul.fireRate[this.tier];
    fr*=g.stats.frMul;
    for(const t of g.towers)if(t!==this&&t.type==='buffer'&&Math.hypot(t.x-this.x,t.y-this.y)<=CONFIG.tile*1.7)
      fr*=1+.3*(1+t.tier*.4);
    return fr;
  }
  update(dt,g){
    if(this.muzzle>0)this.muzzle-=dt;
    if(this.placeAnim>0)this.placeAnim-=dt*4;
    const data=CONFIG.towers[this.type];
    if(this.type==='mint'){
      this.gpsTimer+=dt;
      const gps=data.gps*(1+this.tier*.5)*g.stats.mintMul;
      while(this.gpsTimer>=1){this.gpsTimer-=1;g.gold+=gps;g.goldEarned+=gps;
        g.spawnText(this.x,this.y-CONFIG.tile/2-2,'+'+gps.toFixed(0),'#ffd966');
      }
      this.angle+=dt*1.5;return;
    }
    if(this.type==='buffer'){this.angle+=dt*.8;return;}
    const range=this.getRange(g);
    let target=null,best=Infinity;
    for(const e of g.enemies){
      if(!e.alive)continue;
      const d=Math.hypot(e.x-this.x,e.y-this.y);
      if(d<range){const sc=-e.pathIdx*1000-e.distAlong;if(sc<best){best=sc;target=e;}}
    }
    if(target){
      const want=Math.atan2(target.y-this.y,target.x-this.x);
      let diff=want-this.angle;
      while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
      this.angle+=diff*Math.min(1,dt*10);
    }
    this.cooldown-=dt;
    if(target&&this.cooldown<=0&&Math.abs(this._adiff(target))<.4){
      const fr=this.getFireRate(g);this.cooldown=1/Math.max(.01,fr);
      this.fire(target,g);this.muzzle=.08;
      if(g.stats.doubleShotChance>0&&Math.random()<g.stats.doubleShotChance)
        setTimeout(()=>{if(target.alive)this.fire(target,g);},80);
    }
  }
  _adiff(t){const d=Math.atan2(t.y-this.y,t.x-this.x)-this.angle;return Math.atan2(Math.sin(d),Math.cos(d));}
  fire(target,g){
    let dmg=this.getDmg(g);
    let isCrit=false;
    if(g.stats.critChance>0&&Math.random()<g.stats.critChance){
      isCrit=true;dmg*=1.5*g.stats.critDmgMul;
      g.spawnText(target.x,target.y-14,'CRIT!','#ffea00');
    }
    const pierces=g.stats.pierce||0;
    if(this.type==='archer'||this.type==='crossbow'){
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#e8d098','arrow',{pierces}));
    }else if(this.type==='cannon'){
      const splash=CONFIG.towers.cannon.splash*g.stats.splashMul;
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#3a2a1a','cannon',{splash}));
    }else if(this.type==='mortar'){
      const splash=CONFIG.towers.mortar.splash*g.stats.splashMul;
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#5a3818','mortar',{splash}));
    }else if(this.type==='frost'){
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#a0e8f0','ice',{
        slow:CONFIG.towers.frost.slow,slowDur:CONFIG.towers.frost.slowDur
      }));
    }else if(this.type==='lightning'){
      const chains=CONFIG.towers.lightning.chains+(g.stats.extraChains||0);
      let cur=target;const hit=new Set();const segs=[];
      let from={x:this.x,y:this.y};
      for(let i=0;i<chains&&cur;i++){
        cur.takeDamage(dmg*Math.pow(.85,i),g);
        hit.add(cur);segs.push({a:{...from},b:{x:cur.x,y:cur.y}});from={x:cur.x,y:cur.y};
        let next=null,bd=130;
        for(const e of g.enemies)if(e.alive&&!hit.has(e)){const d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<bd){bd=d;next=e;}}
        cur=next;
      }
      g.lightnings.push({segs,time:.22});
    }else if(this.type==='arcane'){
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#d8b8ff','arcane',{pierces}));
    }else if(this.type==='poison'){
      const dotBase=CONFIG.towers.poison.dot*(g.stats.poisonMul||1)*(.6+this.tier*.3);
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#8be060','poison',{dot:dotBase,dotDur:CONFIG.towers.poison.dotDur}));
    }else if(this.type==='plague'){
      const dotBase=CONFIG.towers.plague.dot*(g.stats.poisonMul||1)*(.6+this.tier*.3);
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,'#88e0a0','poison',{dot:dotBase,dotDur:CONFIG.towers.plague.dotDur}));
    }else if(this.type==='sniper'){
      const single=g.stats.singleDmgMul||1;dmg*=single;
      g.projectiles.push(new Projectile(this.x,this.y,target,dmg,isCrit?'#ffea00':'#fff','bullet',{pierces}));
    }
    SFX.shoot(this.type);
  }
  upgradeCost(){if(this.tier>=2)return -1;return Math.round(CONFIG.towers[this.type].cost*CONFIG.upgradeCost[this.tier+1]);}
}
