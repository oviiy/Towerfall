function roundRectPath(ctx,x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0],y);
  ctx.lineTo(x+w-r[1],y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r[1]);
  ctx.lineTo(x+w,y+h-r[2]);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
  ctx.lineTo(x+r[3],y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r[3]);
  ctx.lineTo(x,y+r[0]);
  ctx.quadraticCurveTo(x,y,x+r[0],y);
  ctx.closePath();
}

const Sprites = {
  tower(ctx,type,cx,cy,tier=0,angle=Math.PI/2,muzzle=0,scale=1){
    const d=CONFIG.towers[type];
    ctx.save();ctx.translate(cx,cy);ctx.scale(scale,scale);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();ctx.ellipse(0,15,15,5,0,0,Math.PI*2);ctx.fill();
    // Pedestal
    const pg=ctx.createLinearGradient(0,7,0,17);
    pg.addColorStop(0,d.c2);pg.addColorStop(1,d.c3);
    ctx.fillStyle=pg;
    roundRectPath(ctx,-13,7,26,10,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';
    roundRectPath(ctx,-13,7,26,2,[3,3,0,0]);ctx.fill();

    if(type==='mint'){
      const t=performance.now()/600;
      for(let i=0;i<3;i++){
        const grad=ctx.createLinearGradient(0,-i*4-2,0,-i*4+3);
        grad.addColorStop(0,d.c1);grad.addColorStop(1,d.c2);
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.ellipse(0,-i*4+2,9-i*1.5,3-i*.4,0,0,Math.PI*2);ctx.fill();
      }
      const gx=Math.sin(t)*1.5;
      ctx.shadowColor=d.c1;ctx.shadowBlur=10;
      ctx.fillStyle='#fff8d0';
      ctx.beginPath();ctx.moveTo(gx,-12);ctx.lineTo(gx+3,-9);ctx.lineTo(gx,-6);ctx.lineTo(gx-3,-9);ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      const sp=t*2;
      for(let i=0;i<3;i++){const a=sp+i*2.1;
        ctx.fillStyle=`rgba(255,240,180,${.3+Math.sin(a*3)*.3})`;
        ctx.beginPath();ctx.arc(Math.cos(a)*12,Math.sin(a)*8-3,1.2,0,Math.PI*2);ctx.fill();
      }
      this._td(ctx,tier);ctx.restore();return;
    }
    if(type==='buffer'){
      const t=performance.now()/600;
      const float=Math.sin(t*1.5)*1.5;
      ctx.shadowColor=d.c1;ctx.shadowBlur=14;
      ctx.strokeStyle=`rgba(216,184,255,${.4+Math.abs(Math.sin(t*2))*.3})`;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,float,11,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
      const cg=ctx.createLinearGradient(0,-9+float,0,7+float);
      cg.addColorStop(0,d.c1);cg.addColorStop(1,d.c3);
      ctx.fillStyle=cg;
      ctx.beginPath();
      ctx.moveTo(0,-9+float);ctx.lineTo(6,-2+float);ctx.lineTo(4,7+float);
      ctx.lineTo(-4,7+float);ctx.lineTo(-6,-2+float);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.beginPath();ctx.moveTo(0,-9+float);ctx.lineTo(3,-2+float);ctx.lineTo(0,5+float);ctx.lineTo(-3,-2+float);ctx.closePath();ctx.fill();
      for(let i=0;i<3;i++){const a=t*1.5+i*Math.PI*2/3;
        ctx.fillStyle=d.c1;
        ctx.beginPath();ctx.arc(Math.cos(a)*9,Math.sin(a)*9+float-2,1.4,0,Math.PI*2);ctx.fill();
      }
      this._td(ctx,tier);ctx.restore();return;
    }
    // Generic turret
    const bg=ctx.createRadialGradient(-3,-3,1,0,0,11);
    bg.addColorStop(0,d.c1);bg.addColorStop(.55,d.c2);bg.addColorStop(1,d.c3);
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=d.c3;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.stroke();
    if(tier>=1){
      ctx.shadowColor=d.c1;ctx.shadowBlur=8;
      ctx.strokeStyle=d.c1;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }
    if(tier>=2){
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2+Math.PI/4;
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(Math.cos(a)*8.5,Math.sin(a)*8.5,1.2,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath();ctx.ellipse(-3,-4,5,3,0,0,Math.PI*2);ctx.fill();

    // Barrel
    const blen=(type==='sniper'?20:type==='cannon'||type==='mortar'?13:type==='archer'||type==='crossbow'?14:type==='arcane'?12:11)+tier*2;
    const bw=(type==='cannon'||type==='mortar'?6:type==='sniper'?3:type==='arcane'?4:3.5)+(tier>1?1:0);
    ctx.save();ctx.rotate(angle);
    ctx.fillStyle=d.c3;
    roundRectPath(ctx,-1,-bw/2-1,blen+1,bw+2,2);ctx.fill();
    const barg=ctx.createLinearGradient(0,-bw/2,0,bw/2);
    barg.addColorStop(0,d.c1);barg.addColorStop(.5,d.c2);barg.addColorStop(1,d.c3);
    ctx.fillStyle=barg;
    roundRectPath(ctx,0,-bw/2,blen,bw,1.5);ctx.fill();
    ctx.fillStyle=d.c3;
    roundRectPath(ctx,blen-3,-bw/2-1,3,bw+2,1.5);ctx.fill();
    if(type==='archer'||type==='crossbow'){
      ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(0,-4);ctx.bezierCurveTo(blen*.6,-3,blen*.6,3,0,4);ctx.stroke();
      if(type==='crossbow'){
        ctx.strokeStyle=d.c1;ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(blen*.4,-5);ctx.lineTo(blen*.4,5);ctx.stroke();
      }
    }
    if(type==='arcane'){
      // glowing tip
      ctx.shadowColor=d.c1;ctx.shadowBlur=10;
      ctx.fillStyle=d.c1;
      ctx.beginPath();ctx.arc(blen,0,2.5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    if(muzzle>0){
      ctx.shadowColor='#fff8d0';ctx.shadowBlur=12;
      ctx.fillStyle='#fff8d0';
      ctx.beginPath();ctx.arc(blen+2,0,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffaa44';
      ctx.beginPath();ctx.arc(blen+4,0,2,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.restore();
    this._td(ctx,tier);
    ctx.restore();
  },
  _td(ctx,tier){
    for(let i=0;i<3;i++){
      const x=-5+i*5;
      ctx.fillStyle=i<=tier?'#ffd54a':'rgba(255,255,255,0.15)';
      if(i<=tier){ctx.shadowColor='#ffd54a';ctx.shadowBlur=4;}
      ctx.beginPath();ctx.arc(x,15,1.5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  },
  enemy(ctx,e){
    const x=e.x,y=e.y,s=e.size,half=s/2;
    if(e.dodging&&e.type==='phantom')ctx.globalAlpha=.45;
    if(e.phase>0)ctx.globalAlpha=.65;
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();ctx.ellipse(x,y+half-1,half*.85,3,0,0,Math.PI*2);ctx.fill();
    const c1=e.flash>0?'#fff':e.c1;
    const c2=e.flash>0?'#ffe6e6':e.c2;
    const t=performance.now()/1000;
    const breath=Math.sin(t*4+e.bob)*.5;

    if(e.type==='grunt'||e.type==='behemoth'){
      const grad=ctx.createRadialGradient(x-s*.2,y-s*.25,s*.1,x,y,s*.7);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.ellipse(x,y+breath*.5,half*1.05,half*.95,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(0,0,0,${e.isBoss?.55:.35})`;ctx.lineWidth=e.isBoss?2:1.5;ctx.stroke();
      const eyeY=y-half*.2+breath*.5;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x-half*.32,eyeY,half*.22,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+half*.32,eyeY,half*.22,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a0808';
      ctx.beginPath();ctx.arc(x-half*.32,eyeY+1,half*.12,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+half*.32,eyeY+1,half*.12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a0808';ctx.lineWidth=Math.max(1.2,half*.15);ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x-half*.55,eyeY-half*.45);ctx.lineTo(x-half*.15,eyeY-half*.25);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+half*.15,eyeY-half*.25);ctx.lineTo(x+half*.55,eyeY-half*.45);ctx.stroke();
      ctx.lineCap='butt';
      ctx.fillStyle='#1a0808';
      ctx.beginPath();ctx.ellipse(x,y+half*.4,half*.35,half*.18,0,0,Math.PI*2);ctx.fill();
      if(e.isBoss){
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.moveTo(x-half*.3,y+half*.32);ctx.lineTo(x-half*.18,y+half*.55);ctx.lineTo(x-half*.06,y+half*.32);ctx.fill();
        ctx.beginPath();ctx.moveTo(x+half*.06,y+half*.32);ctx.lineTo(x+half*.18,y+half*.55);ctx.lineTo(x+half*.3,y+half*.32);ctx.fill();
        ctx.fillStyle='#ffd54a';
        ctx.beginPath();
        ctx.moveTo(x-half*.55,y-half*.7);ctx.lineTo(x-half*.4,y-half*.95);
        ctx.lineTo(x-half*.2,y-half*.75);ctx.lineTo(x,y-half*1.1);
        ctx.lineTo(x+half*.2,y-half*.75);ctx.lineTo(x+half*.4,y-half*.95);
        ctx.lineTo(x+half*.55,y-half*.7);ctx.closePath();ctx.fill();
        ctx.strokeStyle='#7a5800';ctx.lineWidth=.8;ctx.stroke();
      }
    }
    else if(e.type==='runner'){
      const f=e.facing||0;
      ctx.save();ctx.translate(x,y);ctx.rotate(f);
      const grad=ctx.createLinearGradient(-half,0,half,0);
      grad.addColorStop(0,c2);grad.addColorStop(1,c1);
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.moveTo(half*1.1,0);
      ctx.bezierCurveTo(half*.5,-half*.9,-half,-half*.7,-half*1.1,0);
      ctx.bezierCurveTo(-half,half*.7,half*.5,half*.9,half*1.1,0);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,255,${.3+Math.sin(t*8)*.2})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-half*1.3,-half*.3);ctx.lineTo(-half*1.7,-half*.3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-half*1.3,half*.3);ctx.lineTo(-half*1.7,half*.3);ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.ellipse(half*.3,-half*.1,half*.25,half*.15,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a1208';
      ctx.beginPath();ctx.ellipse(half*.4,-half*.1,half*.12,half*.1,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    else if(e.type==='tank'){
      ctx.fillStyle='#1a1a22';
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(x+Math.cos(a)*half*1.05,y+Math.sin(a)*half*.9);}
      ctx.closePath();ctx.fill();
      const grad=ctx.createLinearGradient(0,y-half,0,y+half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(x+Math.cos(a)*half*.9,y+Math.sin(a)*half*.78);}
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.stroke();
      ctx.shadowColor='#ff3030';ctx.shadowBlur=8;
      ctx.fillStyle='#ff5050';
      roundRectPath(ctx,x-half*.55,y-half*.18,half*1.1,half*.36,half*.18);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff';
      roundRectPath(ctx,x-half*.45,y-half*.12,half*.9,half*.16,half*.08);ctx.fill();
      ctx.fillStyle='#3a3a48';
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.arc(x+Math.cos(a)*half*.8,y+Math.sin(a)*half*.7,1.5,0,Math.PI*2);ctx.fill();}
    }
    else if(e.type==='swarm'){
      const grad=ctx.createRadialGradient(x-1,y-1,0,x,y,half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(x,y,half,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#1a0808';
      ctx.beginPath();ctx.arc(x,y-half*.2,half*.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x-half*.1,y-half*.3,half*.12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=c2;ctx.lineWidth=1;
      const wig=Math.sin(t*8)*1;
      ctx.beginPath();ctx.moveTo(x-half*.4,y-half);ctx.lineTo(x-half*.6+wig,y-half*1.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+half*.4,y-half);ctx.lineTo(x+half*.6-wig,y-half*1.5);ctx.stroke();
    }
    else if(e.type==='shielded'){
      ctx.fillStyle='#0a0e1a';
      roundRectPath(ctx,x-half,y-half,s,s,3);ctx.fill();
      const grad=ctx.createLinearGradient(0,y-half,0,y+half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      roundRectPath(ctx,x-half+1,y-half+1,s-2,s-2,3);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.7)';
      roundRectPath(ctx,x-half*.6,y-half*.1,half*1.2,half*.5,2);ctx.fill();
      ctx.fillStyle='#aaccff';ctx.shadowColor='#5dafff';ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(x-half*.3,y+half*.13,half*.12,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+half*.3,y+half*.13,half*.12,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      if(e.shield>0){
        const pul=.5+.5*Math.sin(performance.now()/200);
        ctx.strokeStyle=`rgba(160,200,255,${.55+pul*.3})`;ctx.lineWidth=2;
        ctx.shadowColor='#5dafff';ctx.shadowBlur=10;
        ctx.beginPath();ctx.arc(x,y,half+5,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
        ctx.fillStyle=`rgba(160,200,255,${.1+pul*.1})`;
        ctx.beginPath();ctx.arc(x,y,half+5,0,Math.PI*2);ctx.fill();
      }
    }
    else if(e.type==='healer'){
      const grad=ctx.createRadialGradient(x-2,y-2,0,x,y,half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(x,y,half,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#1a0808';
      ctx.beginPath();ctx.arc(x-half*.3,y-half*.15,half*.12,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+half*.3,y-half*.15,half*.12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a0808';ctx.lineWidth=1.2;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(x,y+half*.15,half*.25,.2,Math.PI-.2);ctx.stroke();
      ctx.lineCap='butt';
      ctx.shadowColor='#fff';ctx.shadowBlur=6;
      ctx.fillStyle='#fff';
      ctx.fillRect(x-half*.5,y-half*.95,half,half*.32);
      ctx.fillRect(x-half*.18,y-half*1.25,half*.36,half*.95);
      ctx.shadowBlur=0;
      const pul=.5+.5*Math.sin(performance.now()/300);
      ctx.strokeStyle=`rgba(255,180,220,${.3+pul*.5})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,half+5+pul*5,0,Math.PI*2);ctx.stroke();
    }
    else if(e.type==='brute'){
      // big charging beast
      const f=e.facing||0;
      ctx.save();ctx.translate(x,y);ctx.rotate(f);
      const grad=ctx.createRadialGradient(-half*.2,-half*.2,2,0,0,half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(0,0,half,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a0404';ctx.lineWidth=2;ctx.stroke();
      // horns
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.moveTo(-half*.5,-half*.6);ctx.lineTo(-half*.9,-half*1.2);ctx.lineTo(-half*.3,-half*.8);ctx.fill();
      ctx.beginPath();ctx.moveTo(half*.5,-half*.6);ctx.lineTo(half*.9,-half*1.2);ctx.lineTo(half*.3,-half*.8);ctx.fill();
      // eyes
      ctx.shadowColor='#ff4040';ctx.shadowBlur=6;
      ctx.fillStyle='#ff4040';
      ctx.beginPath();ctx.arc(-half*.3,-half*.1,half*.13,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(half*.3,-half*.1,half*.13,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // mouth
      ctx.fillStyle='#1a0404';
      ctx.beginPath();ctx.ellipse(0,half*.3,half*.4,half*.18,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      for(let i=-2;i<=2;i++){
        ctx.beginPath();ctx.moveTo(i*half*.15,half*.3);ctx.lineTo(i*half*.15,half*.45);ctx.lineTo(i*half*.15+2,half*.3);ctx.fill();
      }
      // charge effect
      if(e.charging){
        ctx.strokeStyle=`rgba(255,80,80,${.4+Math.sin(t*16)*.4})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(0,0,half+5,0,Math.PI*2);ctx.stroke();
      }
      ctx.restore();
    }
    else if(e.type==='specter'||e.type==='phantom'){
      ctx.shadowColor=c1;ctx.shadowBlur=14;
      const grad=ctx.createRadialGradient(x,y,0,x,y,half*1.3);
      grad.addColorStop(0,c1);grad.addColorStop(.7,c2);grad.addColorStop(1,'rgba(40,20,80,0.4)');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(x,y-half*.3,half*.85,Math.PI,0);
      const wig=Math.sin(t*4)*2;
      ctx.lineTo(x+half*.85,y+half*.4);
      ctx.bezierCurveTo(x+half*.5,y+half*.6+wig,x+half*.3,y+half*.3,x,y+half*.5);
      ctx.bezierCurveTo(x-half*.3,y+half*.7-wig,x-half*.5,y+half*.4,x-half*.85,y+half*.4);
      ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      ctx.shadowColor='#ffd54a';ctx.shadowBlur=8;
      ctx.fillStyle='#ffea88';
      ctx.beginPath();ctx.arc(x-half*.3,y-half*.3,half*.18,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+half*.3,y-half*.3,half*.18,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    else if(e.type==='splitter'){
      // bumpy blob
      ctx.fillStyle=c2;
      ctx.beginPath();
      const lobes=5;
      for(let i=0;i<lobes;i++){
        const a=i*Math.PI*2/lobes;
        const r=half*(1+.15*Math.sin(t*2+i));
        ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
      }
      ctx.closePath();ctx.fill();
      const grad=ctx.createRadialGradient(x,y,half*.2,x,y,half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(x,y,half*.85,0,Math.PI*2);ctx.fill();
      // 3 small eyes
      ctx.fillStyle='#fff';
      const eyeOff=[[-.4,-.1],[.4,-.1],[0,.3]];
      for(const [ex,ey] of eyeOff){
        ctx.beginPath();ctx.arc(x+ex*half,y+ey*half,half*.16,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#1a0808';
        ctx.beginPath();ctx.arc(x+ex*half,y+ey*half,half*.08,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';
      }
    }
    else if(e.type==='hivemind'){
      const grad=ctx.createRadialGradient(x,y,half*.2,x,y,half);
      grad.addColorStop(0,c1);grad.addColorStop(1,c2);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(x,y,half,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.arc(x,y,half*(.4+i*.2),0,Math.PI*2);ctx.stroke();
      }
      ctx.shadowColor='#ffea44';ctx.shadowBlur=8;
      ctx.fillStyle='#ffea44';
      const eyes=[[-.4,-.3],[.4,-.3],[-.25,.15],[.25,.15],[0,-.05]];
      for(const [ex,ey] of eyes){
        ctx.beginPath();ctx.arc(x+ex*half,y+ey*half,half*.12,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    if(e.frozen>0){
      ctx.fillStyle='rgba(160,232,240,0.5)';
      ctx.beginPath();ctx.arc(x,y,half+2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#a0e8f0';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,half+2,0,Math.PI*2);ctx.stroke();
    }
    const hpR=Math.max(0,e.hp/e.maxHp);
    const barW=s*1.1+(e.isBoss?20:0);
    ctx.fillStyle='rgba(0,0,0,.7)';
    roundRectPath(ctx,x-barW/2-1,y-half-7,barW+2,5,2);ctx.fill();
    const hpC=hpR>.5?'#5cdb95':hpR>.25?'#ffd54a':'#ff7b8e';
    ctx.fillStyle=hpC;
    roundRectPath(ctx,x-barW/2,y-half-6,Math.max(2,barW*hpR),3,1);ctx.fill();
    if(e.shield>0){
      ctx.fillStyle='#bcd6ff';
      roundRectPath(ctx,x-barW/2,y-half-11,barW*(e.shield/e.maxShield),2,1);ctx.fill();
    }
    if(e.slow>0){
      ctx.fillStyle='#5dd5e8';
      ctx.beginPath();ctx.arc(x-3,y+half+3,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+3,y+half+3,1.5,0,Math.PI*2);ctx.fill();
    }
    if(e.dot>0){
      ctx.fillStyle='#9bd166';
      const op=(performance.now()/100)%6;
      ctx.beginPath();ctx.arc(x-half+op*3,y-half-2,1.2,0,Math.PI*2);ctx.fill();
    }
  },
  // Slot indicator
  slot(ctx,sx,sy,filled,selected,t){
    ctx.save();ctx.translate(sx,sy);
    if(filled){
      ctx.shadowColor=selected?'#ffd54a':'rgba(180,200,255,.4)';
      ctx.shadowBlur=selected?14:6;
      ctx.strokeStyle=selected?'#ffd54a':'rgba(180,200,255,.35)';
      ctx.lineWidth=selected?2:1.5;
      ctx.beginPath();ctx.arc(0,0,17,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    } else {
      const pul=.5+.5*Math.sin(t*2);
      ctx.shadowColor='rgba(255,201,102,.4)';
      ctx.shadowBlur=8+pul*4;
      ctx.fillStyle=`rgba(255,201,102,${.06+pul*.06})`;
      ctx.beginPath();ctx.arc(0,0,17,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.setLineDash([5,4]);
      ctx.strokeStyle=`rgba(255,213,74,${.5+pul*.3})`;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,17,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle=`rgba(255,213,74,${.6+pul*.3})`;
      ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(5,0);ctx.moveTo(0,-5);ctx.lineTo(0,5);ctx.stroke();
      ctx.lineCap='butt';
    }
    ctx.restore();
  }
};

// ============================================================
// GAME
// ============================================================
const Game = {
  state:'menu',saveData:null,passives:{},
  mapDef:null,chosenClass:null,
  stats:null,items:[],relics:[],
  slots:[],towers:[],enemies:[],projectiles:[],particles:[],texts:[],lightnings:[],rings:[],
  gold:0,lives:0,maxLives:0,startGold:0,startLives:0,maxRelics:6,sellRatio:.5,
  freeRerolls:0,shopChoices:5,bossBonus:0,bonusSlots:0,
  wave:0,kills:0,goldEarned:0,
  xp:0,level:1,
  speed:1,paused:false,combatTime:0,spawnQueue:[],betweenWaves:true,
  currentShop:null,shopBought:[],shopLocked:[],rerollsUsed:0,
  pendingTowerOffer:null, // when we need to replace a slot
  selectedSlot:null,
  runWon:false,runEnded:false,metaEarned:0,
  flashScreen:0,bgPhase:0,guardianUsed:false,
  familyCounts:{}, // tower fam -> count

  init(){
    this.saveData=Save.load();
    SFX.muted=!!this.saveData.muted;
    this.passives=this.computePassives();
    UI.init();
    this.setState('menu');
  },
  computePassives(){
    const p={startGold:CONFIG.startGold,startLives:CONFIG.startLives,maxRelics:CONFIG.startMaxRelics,sellRatio:CONFIG.sellRatio,freeRerolls:0,shopChoices:5,globalDmg:1,bossBonus:0};
    for(const id of this.saveData.upgrades){const t=TREE.find(x=>x.id===id);if(t)t.apply(p);}
    return p;
  },
  defaultStats(){
    return {dmgMul:1,rangeMul:1,frMul:1,critChance:0,critDmgMul:1,splashMul:1,
      killGoldMul:1,flatGoldPerKill:0,extraChains:0,doubleShotChance:0,
      mintMul:1,poisonMul:1,slowMul:1,frostDmgMul:1,allSlow:0,magicMul:1,
      itemDiscount:1,costMul:1,flatDmg:0,waveBonus:0,xpMul:1,bossXpMul:1,
      bossDmgMul:0,execute:0,frostFreeze:0,lifeSteal:0,singleDmgMul:1,pierce:0,
      hoardDmg:false,berserk:false,guardianAngel:false,freeLocks:false,epicDouble:false,
      poisonSpread:false,polyglot:false,mercenary:0};
  },
  setState(s){this.state=s;UI.render();},

  startRun(mapDef){
    this.mapDef=mapDef;
    this.setState('classselect');
  },
  pickClass(cls){
    this.chosenClass=cls;
    this.beginCombat();
  },
  beginCombat(){
    this.passives=this.computePassives();
    this.gold=this.passives.startGold;this.lives=this.passives.startLives;
    this.maxLives=this.passives.startLives;this.maxRelics=this.passives.maxRelics;
    this.sellRatio=this.passives.sellRatio;this.shopChoices=this.passives.shopChoices;
    this.startGold=this.gold;this.startLives=this.lives;
    this.stats=this.defaultStats();
    this.items=[];this.relics=[];
    if(this.passives.globalDmg)this.stats.dmgMul*=this.passives.globalDmg;
    this.bossBonus=this.passives.bossBonus;
    this.freeRerolls=this.passives.freeRerolls;
    if(this.chosenClass)this.chosenClass.apply(this);
    // Init slots based on level + bonus
    this.bonusSlots=0;
    this.xp=0;this.level=1;
    this._rebuildSlots();
    this.towers=[];this.enemies=[];this.projectiles=[];
    this.particles=[];this.texts=[];this.lightnings=[];this.rings=[];
    this.familyCounts={};
    this.wave=0;this.kills=0;this.goldEarned=0;
    this.spawnQueue=[];this.betweenWaves=true;
    this.runEnded=false;this.runWon=false;this.guardianUsed=false;
    this.combatTime=0;this.speed=1;this.paused=false;
    this.selectedSlot=null;this.pendingTowerOffer=null;
    this.setState('combat');
    // Auto-open first shop so player has something to buy
    setTimeout(()=>{if(this.state==='combat'&&this.wave===0)this.openShop(true);},300);
  },

  _rebuildSlots(){
    const lvl=this.level||1;
    const baseSlots=unlocksFor(lvl).slots;
    const totalSlots=Math.min(this.mapDef.slots.length, baseSlots+(this.bonusSlots||0));
    // Preserve existing assignments
    const existing=this.slots||[];
    this.slots=[];
    for(let i=0;i<totalSlots;i++){
      const pos=this.mapDef.slots[i];
      const x=(pos.gx+.5)*CONFIG.tile,y=(pos.gy+.5)*CONFIG.tile;
      const prev=existing.find(s=>s.gx===pos.gx&&s.gy===pos.gy);
      this.slots.push({gx:pos.gx,gy:pos.gy,x,y,tower:prev?prev.tower:null});
      if(prev&&prev.tower){prev.tower.slot=this.slots[this.slots.length-1];}
    }
  },
  _rebuildSlotsFromBonus(){if(this.mapDef)this._rebuildSlots();},

  // XP
  gainXp(amt){
    this.xp+=amt;
    while(this.xp>=xpForLevel(this.level)){
      this.level++;
      this._rebuildSlots();
      UI.toast('Level '+this.level+'! New slot + rarities','lvl');
      UI.banner('LEVEL '+this.level,1.6,'lvl');
      SFX.levelup();
    }
  },

  startNextWave(){
    if(!this.betweenWaves)return;
    this.wave++;this.betweenWaves=false;
    const baseBonus=CONFIG.waveBaseBonus+this.wave*CONFIG.waveScalingBonus;
    this.gold+=baseBonus;
    if(this.stats.waveBonus>0){
      this.gold+=this.stats.waveBonus;
      UI.toast('+'+(baseBonus+this.stats.waveBonus)+' gold','gold');
    } else UI.toast('+'+baseBonus+' gold','gold');
    const def=generateWave(this.wave,this.mapDef);
    this.spawnQueue=[];
    for(const grp of def.spawns){
      let st=grp.delay;
      for(let i=0;i<grp.count;i++){
        this.spawnQueue.push({t:st,type:grp.type,hpMul:grp.hpMul,speedMul:grp.speedMul,isBoss:grp.isBoss});
        st+=grp.gap;
      }
    }
    this.spawnQueue.sort((a,b)=>a.t-b.t);
    this.combatTime=0;SFX.click();
    if(this.wave===18)UI.banner('FINAL BOSS',2);
  },
  update(dt){
    this.bgPhase+=dt;
    if(this.state!=='combat')return;
    if(this.paused)return;
    dt*=this.speed;this.combatTime+=dt;
    if(this.flashScreen>0)this.flashScreen-=dt;
    if(!this.betweenWaves){
      while(this.spawnQueue.length&&this.spawnQueue[0].t<=this.combatTime){
        const s=this.spawnQueue.shift();
        const path=this.mapDef.paths[Math.floor(Math.random()*this.mapDef.paths.length)];
        this.enemies.push(new Enemy(s.type,path,s.hpMul,s.speedMul,s.isBoss));
      }
    }
    for(const t of this.towers)t.update(dt,this);
    for(const e of this.enemies)if(e.alive)e.update(dt,this);
    for(const p of this.projectiles)p.update(dt,this);
    for(const part of this.particles){part.x+=part.vx*dt;part.y+=part.vy*dt;part.vy+=80*dt;part.life-=dt;}
    for(const tx of this.texts){tx.y-=22*dt;tx.life-=dt;}
    for(const l of this.lightnings)l.time-=dt;
    for(const r of this.rings){r.r+=r.vr*dt;r.time-=dt;}
    this.projectiles=this.projectiles.filter(p=>p.alive);
    this.particles=this.particles.filter(p=>p.life>0);
    this.texts=this.texts.filter(t=>t.life>0);
    this.lightnings=this.lightnings.filter(l=>l.time>0);
    this.rings=this.rings.filter(r=>r.time>0);
    if(!this.betweenWaves&&!this.spawnQueue.length&&!this.enemies.some(e=>e.alive)){
      this.betweenWaves=true;
      if(this.wave>=18){this.runWon=true;this.endRun(true);}
      else{SFX.waveClear();UI.banner('Wave '+this.wave+' Clear',1.2,'good');this.openShop();}
    }
    if(this.lives<=0&&!this.runEnded)this.endRun(false);
  },
  endRun(won){
    this.runEnded=true;this.runWon=won;
    let earned=this.wave*5;if(won)earned+=50+this.bossBonus;
    earned+=this.level*10;
    this.metaEarned=earned;
    this.saveData.currency+=earned;this.saveData.stats.totalRuns++;
    this.saveData.stats.totalKills+=this.kills;
    this.saveData.stats.totalGold=(this.saveData.stats.totalGold||0)+Math.round(this.goldEarned);
    if(this.wave>this.saveData.stats.bestWave)this.saveData.stats.bestWave=this.wave;
    if(this.level>(this.saveData.stats.bestLevel||0))this.saveData.stats.bestLevel=this.level;
    Save.save();
    if(won)SFX.win();else SFX.lose();
    setTimeout(()=>this.setState('summary'),700);
  },

  // ----- Shop -----
  rollShopOffer(){
    const allowedRarities=unlocksFor(this.level).rarities;
    // Mix: ~40% tower, 60% item
    const pickTower=Math.random()<.4;
    if(pickTower){
      const towers=this.saveData.unlockedTowers;
      const type=towers[Math.floor(Math.random()*towers.length)];
      const data=CONFIG.towers[type];
      // Tower has implicit rarity by family/cost
      let rarity='common';
      if(data.cost>=100)rarity='rare';
      else if(data.cost>=70)rarity='uncommon';
      return {kind:'tower',type,rarity,cost:Math.round(data.cost*this.stats.costMul)};
    }
    // Item by rarity
    const w={common:50-this.level*4,uncommon:30,rare:15+this.level*2,epic:5+this.level*2,legendary:Math.max(0,this.level-3)*3};
    let total=0;
    for(const k of allowedRarities)total+=Math.max(0,w[k]||0);
    let r=Math.random()*total;let chosen='common';
    for(const k of allowedRarities){r-=Math.max(0,w[k]||0);if(r<=0){chosen=k;break;}}
    const pool=ITEMS.filter(it=>it.rarity===chosen&&(it.stack||!this.items.some(x=>x.id===it.id)));
    if(pool.length===0){
      const any=ITEMS.filter(it=>allowedRarities.includes(it.rarity)&&(it.stack||!this.items.some(x=>x.id===it.id)));
      if(any.length===0)return {kind:'item',item:ITEMS[0],cost:0};
      const item=any[Math.floor(Math.random()*any.length)];
      return {kind:'item',item,cost:Math.round(item.cost*this.stats.itemDiscount)};
    }
    const item=pool[Math.floor(Math.random()*pool.length)];
    return {kind:'item',item,cost:Math.round(item.cost*this.stats.itemDiscount)};
  },
  openShop(initial=false){
    this.shopBought=[];
    this.currentShop=[];
    for(let i=0;i<this.shopChoices;i++)this.currentShop.push(this.rollShopOffer());
    this.shopLocked=this.shopLocked||[];
    this.rerollsUsed=0;
    this.setState('shop');
  },
  buyShop(idx){
    if(this.shopBought.includes(idx))return;
    const offer=this.currentShop[idx];if(!offer)return;
    if(this.gold<offer.cost){UI.toast('Not enough gold','warn');return;}
    if(offer.kind==='tower'){
      // find empty slot or trigger replace
      const empty=this.slots.find(s=>!s.tower);
      if(empty){
        this.gold-=offer.cost;
        this._placeTower(offer.type,empty);
        this.shopBought.push(idx);
        SFX.buy();UI.render();
      } else {
        // need to replace
        this.pendingTowerOffer={offer,idx};
        UI.showReplaceUI();
      }
    } else {
      // item
      const item=offer.item;
      if(!item.stack&&this.items.some(x=>x.id===item.id)){UI.toast('Already owned','warn');return;}
      if(this.relics.length>=this.maxRelics){
        // offer to replace existing relic
        this.pendingItemOffer={offer,idx};
        UI.showRelicReplaceUI();
        return;
      }
      this.gold-=offer.cost;
      this.items.push(item);this.relics.push(item);
      let applyFn=item.apply;applyFn(this);
      if(this.stats.epicDouble&&item.rarity==='epic')applyFn(this);
      this.shopBought.push(idx);
      SFX.buy();UI.render();
    }
  },
  _placeTower(type,slot){
    const t=new Tower(type,slot.gx,slot.gy);
    t.slot=slot;slot.tower=t;
    this.towers.push(t);
    this.familyCounts[t.fam]=(this.familyCounts[t.fam]||0)+1;
    if(this.stats.polyglot){
      // each tower counts as 2 families - pick a random other family
      // (simplified: just boost the count by 1 in another)
    }
    this._applySynergies();
  },
  _applySynergies(){
    // Reset synergy-derived stats? Easier to recompute from scratch.
    // We'll recompute stats from base + class + items + synergies fresh.
    const s=this.defaultStats();
    if(this.passives.globalDmg)s.dmgMul*=this.passives.globalDmg;
    // Class
    if(this.chosenClass){const beforeStats=this.stats;this.stats=s;this.chosenClass.apply(this);}
    // Items
    for(const it of this.items){
      let applyFn=it.apply;applyFn(this);
      if(this.stats.epicDouble&&it.rarity==='epic')applyFn(this);
    }
    // Synergies based on family counts
    for(const fam in this.familyCounts){
      const cnt=this.familyCounts[fam];
      const syn=CONFIG.synergies[fam];if(!syn)continue;
      if(cnt>=syn.t2.n)syn.t2.apply(this.stats);
      else if(cnt>=syn.t1.n)syn.t1.apply(this.stats);
    }
  },
  replaceSlot(slotIdx){
    if(!this.pendingTowerOffer)return;
    const slot=this.slots[slotIdx];if(!slot||!slot.tower)return;
    const offer=this.pendingTowerOffer.offer;
    // refund partial
    const refund=Math.round(slot.tower.totalSpend*this.sellRatio);
    this.gold+=refund;
    // remove old tower
    this.familyCounts[slot.tower.fam]--;
    this.towers=this.towers.filter(t=>t!==slot.tower);
    slot.tower=null;
    // pay and place new
    this.gold-=offer.cost;
    this._placeTower(offer.type,slot);
    this.shopBought.push(this.pendingTowerOffer.idx);
    this.pendingTowerOffer=null;
    UI.toast('+'+refund+'g refund','gold');
    SFX.buy();UI.render();
  },
  cancelReplace(){this.pendingTowerOffer=null;UI.render();},
  replaceRelic(relicIdx){
    if(!this.pendingItemOffer)return;
    const old=this.relics[relicIdx];
    if(!old)return;
    this.gold-=this.pendingItemOffer.offer.cost;
    // Remove old (no de-apply: this is a one-way trade for simplicity)
    this.relics.splice(relicIdx,1);
    this.items.splice(this.items.indexOf(old),1);
    const item=this.pendingItemOffer.offer.item;
    this.items.push(item);this.relics.push(item);
    // Recompute everything since we removed an item
    this._applySynergies();
    this.shopBought.push(this.pendingItemOffer.idx);
    this.pendingItemOffer=null;
    UI.toast('Relic replaced','gold');SFX.buy();UI.render();
  },
  cancelRelicReplace(){this.pendingItemOffer=null;UI.render();},

  toggleLock(idx){
    const i=this.shopLocked.indexOf(idx);
    if(i>=0)this.shopLocked.splice(i,1);
    else this.shopLocked.push(idx);
    SFX.click();UI.render();
  },
  reroll(){
    const cost=this.rerollsUsed<this.freeRerolls?0:10+this.rerollsUsed*5;
    if(cost>0&&this.gold<cost){UI.toast('Not enough gold','warn');return;}
    this.gold-=cost;this.rerollsUsed++;
    const newShop=[];
    for(let i=0;i<this.currentShop.length;i++){
      if(this.shopLocked.includes(i)&&!this.shopBought.includes(i))newShop.push(this.currentShop[i]);
      else if(this.shopBought.includes(i))newShop.push(this.currentShop[i]);
      else newShop.push(this.rollShopOffer());
    }
    this.currentShop=newShop;
    SFX.click();UI.render();
  },
  continueShop(){
    this.currentShop=null;this.shopBought=[];this.shopLocked=[];
    this.pendingTowerOffer=null;this.pendingItemOffer=null;
    this.setState('combat');
  },

  selectSlot(slotIdx){
    const slot=this.slots[slotIdx];if(!slot)return;
    if(slot.tower){this.selectedSlot=slot;UI.showTowerPopup(slot.tower);}
    else {this.selectedSlot=slot;UI.toast('Empty slot — buy a tower from the shop','');}
  },
  upgradeSelected(){
    const t=this.selectedSlot&&this.selectedSlot.tower;if(!t||t.tier>=2)return;
    const c=t.upgradeCost();if(this.gold<c){UI.toast('Not enough gold','warn');return;}
    this.gold-=c;t.tier++;t.totalSpend+=c;
    UI.showTowerPopup(t);
  },
  sellSelected(){
    const slot=this.selectedSlot;if(!slot||!slot.tower)return;
    const t=slot.tower;
    const refund=Math.round(t.totalSpend*this.sellRatio);
    this.gold+=refund;
    this.familyCounts[t.fam]--;
    this.towers=this.towers.filter(x=>x!==t);
    slot.tower=null;this.selectedSlot=null;
    this._applySynergies();
    UI.hidePopup();UI.toast('+'+refund+' gold','gold');UI.render();
  },
  spawnParticles(x,y,color,count=8){
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2,sp=30+Math.random()*60;
      this.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:.4+Math.random()*.4,color,size:1+Math.random()*2});
    }
  },
  spawnText(x,y,t,c){this.texts.push({x,y,text:t,color:c,life:1.2});},
  spawnRing(x,y,r){this.rings.push({x,y,r:0,vr:r*4,time:.25,maxR:r});},
  cycleSpeed(){this.speed=this.speed===1?2:this.speed===2?3:1;},
  togglePause(){this.paused=!this.paused;},
  toggleMute(){SFX.muted=!SFX.muted;this.saveData.muted=SFX.muted;Save.save();}
};

// ============================================================
// RENDER
// ============================================================
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=true;

const Render={
  draw(){
    const W=CONFIG.W,H=CONFIG.H;
    if(Game.state==='combat'||Game.state==='shop'){
      this.drawWorld(W,H);
      if(Game.flashScreen>0){ctx.fillStyle=`rgba(255,80,80,${Game.flashScreen})`;ctx.fillRect(0,0,W,H);}
    } else this.drawIdle(W,H);
  },
  drawIdle(W,H){
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0e1230');grad.addColorStop(1,'#070914');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    const t=performance.now()/1000;
    for(let i=0;i<70;i++){
      const x=((i*47+t*8)%W);
      const y=(i*31)%H;
      const b=(Math.sin(t*2+i)+1)*.3+.4;
      ctx.fillStyle=`rgba(220,220,255,${b})`;
      ctx.beginPath();ctx.arc(x|0,y,1,0,Math.PI*2);ctx.fill();
    }
    // glow at bottom
    const gx=W/2+Math.sin(t*.5)*60;
    const rg=ctx.createRadialGradient(gx,H-100,0,gx,H-100,180);
    rg.addColorStop(0,'rgba(255,201,102,0.25)');rg.addColorStop(1,'rgba(255,201,102,0)');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  },
  drawWorld(W,H){
    const m=Game.mapDef;
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,m.bgGrad[0]);g.addColorStop(1,m.bgGrad[1]);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const gen=MapGen.tilesFor(m);const t=Game.bgPhase;
    for(let y=0;y<CONFIG.gridH;y++)for(let x=0;x<CONFIG.gridW;x++){
      this.drawTile(gen.tiles[y][x],x*CONFIG.tile,y*CONFIG.tile,m,x,y,t);
    }
    this.drawPathFlow(m,t);

    // Draw slots first (under towers)
    for(let i=0;i<Game.slots.length;i++){
      const s=Game.slots[i];
      Sprites.slot(ctx,s.x,s.y,!!s.tower,Game.selectedSlot===s,t);
    }

    // Selected slot range preview
    if(Game.selectedSlot&&Game.selectedSlot.tower){
      const tt=Game.selectedSlot.tower;const r=tt.getRange(Game);
      ctx.fillStyle='rgba(255,213,74,0.06)';
      ctx.beginPath();ctx.arc(tt.x,tt.y,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,213,74,0.6)';ctx.setLineDash([4,3]);ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(tt.x,tt.y,r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }

    // Rings
    for(const r of Game.rings){
      const a=Math.max(0,r.time/.25);
      ctx.strokeStyle=`rgba(255,136,112,${a})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    }

    // Towers
    for(const tw of Game.towers){
      ctx.save();const sc=1+Math.max(0,tw.placeAnim)*.4;
      Sprites.tower(ctx,tw.type,tw.x,tw.y,tw.tier,tw.angle,tw.muzzle,sc);
      // buffer aura connections
      if(tw.type==='buffer'){
        for(const t2 of Game.towers)if(t2!==tw&&Math.hypot(t2.x-tw.x,t2.y-tw.y)<=CONFIG.tile*1.7){
          ctx.strokeStyle=`rgba(180,138,255,${.15+Math.abs(Math.sin(performance.now()/400))*.15})`;
          ctx.beginPath();ctx.moveTo(tw.x,tw.y);ctx.lineTo(t2.x,t2.y);ctx.stroke();
        }
      }
      ctx.restore();
    }
    for(const e of Game.enemies)if(e.alive)Sprites.enemy(ctx,e);
    this.drawProjectiles();
    for(const l of Game.lightnings){
      const a=l.time/.22;
      ctx.strokeStyle=`rgba(255,240,80,${a})`;ctx.lineWidth=2;ctx.beginPath();
      for(const seg of l.segs){
        ctx.moveTo(seg.a.x,seg.a.y);
        const steps=4;
        for(let i=1;i<=steps;i++){
          const tt=i/steps;
          const mx=seg.a.x+(seg.b.x-seg.a.x)*tt+(Math.random()-.5)*5;
          const my=seg.a.y+(seg.b.y-seg.a.y)*tt+(Math.random()-.5)*5;
          ctx.lineTo(mx,my);
        }
      }
      ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,200,${a*.7})`;ctx.lineWidth=1;ctx.stroke();
    }
    for(const p of Game.particles){
      const a=Math.min(1,p.life*1.5);
      ctx.fillStyle=p.color;ctx.globalAlpha=a;
      const sz=Math.max(1,p.size|0);
      ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.font='bold 11px "JetBrains Mono", monospace';ctx.textAlign='center';
    for(const tx of Game.texts){
      const a=Math.min(1,tx.life);ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillText(tx.text,tx.x|0,(tx.y|0)+1);
      ctx.fillStyle=tx.color;ctx.fillText(tx.text,tx.x|0,tx.y|0);
    }
    ctx.globalAlpha=1;ctx.textAlign='left';
    const vg=ctx.createRadialGradient(W/2,H/2,W*.4,W/2,H/2,W*.85);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  },
  drawTile(tile,px,py,m,gx,gy,t){
    const T=CONFIG.tile;
    if(tile.kind==='path'){
      const grad=ctx.createLinearGradient(px,0,px+T,0);
      grad.addColorStop(0,m.pathColor2);grad.addColorStop(.5,m.pathColor);grad.addColorStop(1,m.pathColor2);
      ctx.fillStyle=grad;
      ctx.fillRect(px,py,T,T);
      const sh=Math.sin(t*1.5+gx*.3+gy*.4)*.5+.5;
      ctx.fillStyle=`rgba(255,255,255,${.05+sh*.06})`;
      ctx.fillRect(px+T*.4,py,T*.2,T);
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.beginPath();ctx.arc(px+((gx*7+gy*3)%T*.6)+T*.2,py+((gx*5+gy*2)%T*.6)+T*.25,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px+((gx*11+gy*7)%T*.5)+T*.4,py+((gx*3+gy*5)%T*.5)+T*.55,1.5,0,Math.PI*2);ctx.fill();
    } else if(tile.kind==='grass'){
      const base=tile.v&1?m.grassA:m.grassB;
      const grad=ctx.createRadialGradient(px+T/2,py+T/2,0,px+T/2,py+T/2,T*.7);
      grad.addColorStop(0,base);grad.addColorStop(1,m.grassB);
      ctx.fillStyle=grad;ctx.fillRect(px,py,T,T);
      ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(px,py+T-3,T,3);
      ctx.fillStyle=m.grassDots;
      if(tile.v===0){
        ctx.beginPath();ctx.arc(px+T*.2,py+T*.6,1.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px+T*.75,py+T*.3,1.2,0,Math.PI*2);ctx.fill();
      } else if(tile.v===1){
        ctx.beginPath();ctx.arc(px+T*.45,py+T*.25,1.5,0,Math.PI*2);ctx.fill();
      } else if(tile.v===2){
        ctx.fillStyle='#fff8c8';
        ctx.beginPath();ctx.arc(px+T*.3,py+T*.7,2,0,Math.PI*2);ctx.fill();
      }
    } else if(tile.kind==='rock'){
      ctx.fillStyle=tile.v&1?m.grassA:m.grassB;ctx.fillRect(px,py,T,T);
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.beginPath();ctx.ellipse(px+T/2,py+T*.75,T*.32,T*.12,0,0,Math.PI*2);ctx.fill();
      const grad=ctx.createRadialGradient(px+T*.4,py+T*.4,T*.05,px+T/2,py+T/2,T*.35);
      grad.addColorStop(0,m.rockColor);grad.addColorStop(1,'#3a3a48');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.ellipse(px+T/2,py+T/2,T*.36,T*.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();ctx.ellipse(px+T*.42,py+T*.4,T*.13,T*.06,0,0,Math.PI*2);ctx.fill();
    } else if(tile.kind==='decor'){
      // Decor tiles need to be VISUALLY DISTINCT from placeable grass
      // Add a subtle base tint with darker borders to signal "occupied"
      ctx.fillStyle=tile.v&1?m.grassA:m.grassB;ctx.fillRect(px,py,T,T);
      // dark vignette to show it's blocked
      ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(px,py,T,T);
      if(tile.v===0){
        const sw=Math.sin(t*1.5+gx)*1;
        ctx.fillStyle='rgba(0,0,0,0.4)';
        ctx.beginPath();ctx.ellipse(px+T/2+sw,py+T*.85,T*.3,T*.08,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#3a2410';
        roundRectPath(ctx,px+T*.42,py+T*.5,T*.16,T*.35,3);ctx.fill();
        const grad=ctx.createRadialGradient(px+T*.4+sw,py+T*.3,2,px+T/2+sw,py+T*.4,T*.4);
        grad.addColorStop(0,m.grassDots);
        grad.addColorStop(.7,m.decorColor);
        grad.addColorStop(1,'#0a1f08');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(px+T/2+sw,py+T*.38,T*.36,0,Math.PI*2);ctx.fill();
      } else if(tile.v===1){
        // bush
        ctx.fillStyle='rgba(0,0,0,0.35)';
        ctx.beginPath();ctx.ellipse(px+T/2,py+T*.85,T*.32,T*.08,0,0,Math.PI*2);ctx.fill();
        const grad=ctx.createRadialGradient(px+T*.4,py+T*.4,2,px+T/2,py+T*.55,T*.4);
        grad.addColorStop(0,m.grassDots);grad.addColorStop(1,m.decorColor);
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(px+T*.32,py+T*.6,T*.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px+T*.68,py+T*.6,T*.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px+T*.5,py+T*.45,T*.22,0,Math.PI*2);ctx.fill();
      } else {
        // crystal cluster
        ctx.fillStyle='rgba(0,0,0,0.4)';
        ctx.beginPath();ctx.ellipse(px+T/2,py+T*.85,T*.3,T*.08,0,0,Math.PI*2);ctx.fill();
        const cgrad=ctx.createLinearGradient(0,py+T*.2,0,py+T*.85);
        cgrad.addColorStop(0,'#dde6f0');cgrad.addColorStop(1,m.rockColor);
        ctx.fillStyle=cgrad;
        ctx.beginPath();
        ctx.moveTo(px+T*.5,py+T*.2);ctx.lineTo(px+T*.62,py+T*.45);
        ctx.lineTo(px+T*.55,py+T*.82);ctx.lineTo(px+T*.45,py+T*.82);
        ctx.lineTo(px+T*.38,py+T*.45);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.beginPath();ctx.moveTo(px+T*.5,py+T*.25);ctx.lineTo(px+T*.5,py+T*.78);ctx.lineTo(px+T*.42,py+T*.5);ctx.closePath();ctx.fill();
      }
    }
  },
  drawPathFlow(m,t){
    for(const path of m.paths){
      let totalLen=0;const segLens=[];
      for(let i=0;i<path.length-1;i++){
        const a=path[i],b=path[i+1];
        const len=Math.hypot(b.x-a.x,b.y-a.y)*CONFIG.tile;
        segLens.push(len);totalLen+=len;
      }
      for(let i=0;i<14;i++){
        let d=((i/14)*totalLen+(t*15)%totalLen);
        let segIdx=0;
        while(segIdx<segLens.length-1&&d>segLens[segIdx]){d-=segLens[segIdx];segIdx++;}
        const a=path[segIdx],b=path[segIdx+1];
        const ratio=segLens[segIdx]?d/segLens[segIdx]:0;
        const x=(a.x+.5+(b.x-a.x)*ratio)*CONFIG.tile;
        const y=(a.y+.5+(b.y-a.y)*ratio)*CONFIG.tile;
        if(y<0||y>CONFIG.H)continue;
        ctx.fillStyle='rgba(255,255,255,0.18)';
        ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();
      }
    }
  },
  drawProjectiles(){
    for(const p of Game.projectiles){
      for(let i=0;i<p.trail.length;i++){
        const tr=p.trail[i];if(tr.t<=0)continue;
        const a=Math.min(1,tr.t/.18);
        ctx.globalAlpha=a*.4;
        ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(tr.x,tr.y,2.5*a,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      const x=p.x,y=p.y;
      if(p.kind==='arrow'){
        ctx.save();ctx.translate(x,y);ctx.rotate(p.angle);
        ctx.fillStyle='#5a3818';
        roundRectPath(ctx,-8,-1,16,2,1);ctx.fill();
        ctx.fillStyle='#dde2ec';
        ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(4,-2.5);ctx.lineTo(4,2.5);ctx.closePath();ctx.fill();
        ctx.fillStyle='#c64b4b';
        ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-11,-3);ctx.lineTo(-9,0);ctx.lineTo(-11,3);ctx.closePath();ctx.fill();
        ctx.restore();
      } else if(p.kind==='cannon'||p.kind==='mortar'){
        ctx.shadowColor='#000';ctx.shadowBlur=4;
        const grad=ctx.createRadialGradient(x-1.5,y-1.5,1,x,y,p.kind==='mortar'?5:4);
        grad.addColorStop(0,'#5a5a62');grad.addColorStop(1,'#1a1a22');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(x,y,p.kind==='mortar'?5:4,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      } else if(p.kind==='ice'){
        ctx.shadowColor='#5dd5e8';ctx.shadowBlur=8;
        ctx.fillStyle='#cff5fb';
        ctx.beginPath();ctx.moveTo(x,y-3.5);ctx.lineTo(x+3,y);ctx.lineTo(x,y+3.5);ctx.lineTo(x-3,y);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
      } else if(p.kind==='poison'){
        ctx.shadowColor='#7ad14a';ctx.shadowBlur=8;
        const grad=ctx.createRadialGradient(x,y,0,x,y,4);
        grad.addColorStop(0,'#cfff80');grad.addColorStop(1,p.color);
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      } else if(p.kind==='arcane'){
        ctx.shadowColor='#d8b8ff';ctx.shadowBlur=12;
        const grad=ctx.createRadialGradient(x,y,0,x,y,5);
        grad.addColorStop(0,'#fff');grad.addColorStop(.5,'#d8b8ff');grad.addColorStop(1,'#7c5fcc');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      } else if(p.kind==='bullet'){
        ctx.save();ctx.translate(x,y);ctx.rotate(p.angle);
        ctx.shadowColor=p.color;ctx.shadowBlur=6;
        ctx.fillStyle=p.color;
        roundRectPath(ctx,-5,-1.2,10,2.4,1);ctx.fill();
        ctx.fillStyle='#fff';
        roundRectPath(ctx,2,-.8,3,1.6,.8);ctx.fill();
        ctx.shadowBlur=0;
        ctx.restore();
      }
    }
  }
};

const overlay=document.getElementById('overlay');
const popEl=document.getElementById('pop');
const actionEl=document.getElementById('actionBar');

const hudWave=document.getElementById('hudWave');
const hudLives=document.getElementById('hudLives');
const hudGold=document.getElementById('hudGold');
const speedBtn=document.getElementById('speedBtn');
const pauseBtn=document.getElementById('pauseBtn');
const muteBtn=document.getElementById('muteBtn');
const menuBtn=document.getElementById('menuBtn');

const xpLevel=document.getElementById('xpLevel');
const xpText=document.getElementById('xpText');

const UI={
  _actionKey:'',_synergyKey:'',_controlsKey:'',_xpKey:'',
  init(){
    const ptCoords=e=>{
      const t=e.touches&&e.touches[0]||e.changedTouches&&e.changedTouches[0]||e;
      const rect=canvas.getBoundingClientRect();
      const cx=(t.clientX-rect.left)/rect.width*CONFIG.W;
      const cy=(t.clientY-rect.top)/rect.height*CONFIG.H;
      return {x:cx,y:cy};
    };
    canvas.addEventListener('click',e=>{
      SFX.ensure();
      if(Game.state!=='combat')return;
      const c=ptCoords(e);
      // find nearest slot within tap range (generous for touch)
      let bestIdx=-1,bd=999;
      for(let i=0;i<Game.slots.length;i++){
        const s=Game.slots[i];
        const d=Math.hypot(c.x-s.x,c.y-s.y);
        if(d<28&&d<bd){bd=d;bestIdx=i;}
      }
      if(bestIdx>=0){Game.selectSlot(bestIdx);}
      else {Game.selectedSlot=null;UI.hidePopup();}
    });
    let lastTap=0;
    canvas.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<300)e.preventDefault();lastTap=now;});
    document.addEventListener('keydown',e=>{
      if(Game.state!=='combat'){if(e.key==='Escape')this.hide();return;}
      if(e.key===' '){e.preventDefault();Game.togglePause();}
      else if(e.key==='+'||e.key==='='||e.key==='-')Game.cycleSpeed();
      else if(e.key==='m'||e.key==='M')Game.toggleMute();
      else if(e.key==='Escape'){Game.selectedSlot=null;UI.hidePopup();}
      else if(e.key==='Enter'){if(Game.betweenWaves)Game.startNextWave();}
    });
    speedBtn.onclick=()=>{Game.cycleSpeed();SFX.click();};
    pauseBtn.onclick=()=>{Game.togglePause();SFX.click();};
    muteBtn.onclick=()=>{Game.toggleMute();SFX.click();};
    menuBtn.onclick=()=>{
      SFX.click();
      if(Game.state==='combat'){Game.paused=true;this.showInGameMenu();}
      else this.hide();
    };
    document.addEventListener('click',e=>{
      if(!popEl.contains(e.target)&&!canvas.contains(e.target)&&Game.selectedSlot){
        Game.selectedSlot=null;UI.hidePopup();
      }
    });
    window.addEventListener('resize',()=>this.layoutPopup());
  },
  syncFrame(){
    // HUD
    if(Game.state==='combat'||Game.state==='shop'){
      hudWave.textContent=Game.wave+'/18';
      hudLives.textContent=Math.max(0,Game.lives|0);
      hudGold.textContent=Math.floor(Game.gold);
    }
    // XP bar
    const lvl=Game.level||1;
    const need=xpForLevel(lvl);
    const prev=lvl>1?xpForLevel(lvl-1):0;
    const have=Math.max(0,Game.xp-prev);
    const total=Math.max(1,need-prev);
    const pct=Math.min(100,have/total*100);
    const xkey=`${lvl}_${pct|0}`;
    if(this._xpKey!==xkey){
      this._xpKey=xkey;
      xpFill.style.width=pct+'%';
      xpLevel.textContent=lvl;
      xpText.textContent='XP '+Math.floor(have)+'/'+Math.floor(total);
    }
    // controls
    const ckey=Game.speed+'_'+Game.paused+'_'+SFX.muted;
    if(this._controlsKey!==ckey){
      this._controlsKey=ckey;
      speedBtn.textContent=Game.speed+'×';speedBtn.classList.toggle('on',Game.speed>1);
      pauseBtn.textContent=Game.paused?'▶':'II';pauseBtn.classList.toggle('on',Game.paused);
      muteBtn.textContent=SFX.muted?'✕':'♪';muteBtn.classList.toggle('on',!SFX.muted);
    }
    // Action: live wave count update
    if(Game.state==='combat'&&!Game.betweenWaves&&!Game.runEnded){
      const remaining=Game.spawnQueue.length+Game.enemies.filter(e=>e.alive).length;
      const sub=actionEl.querySelector('.act-sub');
      if(sub)sub.textContent=remaining+' left';
    }
  },
  rebuildAction(){
    if(Game.state!=='combat'){actionEl.style.display='none';this._actionKey='';return;}
    actionEl.style.display='';
    const key=Game.runEnded?'ended':Game.betweenWaves?`wait_${Game.wave}`:`live_${Game.wave}`;
    if(this._actionKey===key)return;
    this._actionKey=key;
    if(Game.runEnded){actionEl.innerHTML='';return;}
    if(Game.betweenWaves&&Game.wave<18){
      const final=Game.wave===17;
      const label=Game.wave===0?'Start ▶':final?'Final Boss ▶':'Wave '+(Game.wave+1)+' ▶';
      actionEl.innerHTML=`<button class="btn primary pulse" id="nw">${label}</button>
        <button class="btn secondary" id="op-shop" title="Open Shop">🛒</button>`;
      document.getElementById('nw').onclick=()=>{Game.startNextWave();SFX.click();};
      document.getElementById('op-shop').onclick=()=>{SFX.click();Game.openShop();};
    } else if(!Game.betweenWaves){
      actionEl.innerHTML=`<button class="btn" disabled><span>Wave ${Game.wave}</span> · <span class="act-sub">…</span></button>`;
    }
  },
  rebuildSynergy(){
    if(Game.state!=='combat'&&Game.state!=='shop'){synergyEl.style.display='none';this._synergyKey='';return;}
    synergyEl.style.display='';
    const fc=Game.familyCounts||{};
    const key=Object.entries(fc).map(([k,v])=>k+v).sort().join('_')+'_'+Game.relics.length;
    if(this._synergyKey===key)return;
    this._synergyKey=key;
    const parts=[];
    for(const fid in CONFIG.families){
      const f=CONFIG.families[fid];
      const cnt=fc[fid]||0;
      const syn=CONFIG.synergies[fid];
      let tier=0;
      if(cnt>=syn.t2.n)tier=2;else if(cnt>=syn.t1.n)tier=1;
      const cls=cnt===0?'dim':tier===2?'tier2':tier===1?'tier1':'';
      parts.push(`<div class="fam-pill ${cls}" style="color:${f.col};border-color:${f.col};" title="${tier?syn['t'+tier].desc:'Need '+syn.t1.n+' for synergy'}"><span class="ic">${f.icon}</span>${cnt}</div>`);
    }
    synergyEl.innerHTML=parts.join('');
  },
  toast(msg,kind=''){
    const el=document.createElement('div');el.className='toast '+kind;el.textContent=msg;
    toastWrap.appendChild(el);setTimeout(()=>el.remove(),2200);
  },
  banner(msg,dur=1.5,kind=''){
    const wrap=document.getElementById('canvasWrap');
    const old=wrap.querySelector('.banner');if(old)old.remove();
    const b=document.createElement('div');b.className='banner'+(kind==='lvl'?' lvl':'');
    if(kind==='good')b.style.color='var(--green)',b.style.borderColor='var(--green)';
    b.textContent=msg;wrap.appendChild(b);
    setTimeout(()=>b.remove(),dur*1000);
  },
  showTowerPopup(t){
    const cost=t.upgradeCost();const sell=Math.round(t.totalSpend*Game.sellRatio);
    const data=CONFIG.towers[t.type];
    const fam=CONFIG.families[t.fam];

      <div class="pop-name">

      </div>

      <div class="pop-stats">
        <div>DMG <span>${dmg}</span></div>
        <div>RNG <span>${range}</span></div>

        <div>Spent <span>${t.totalSpend}g</span></div>
      </div>
      <div class="pop-actions">
        <button class="btn primary" id="popUp" ${cost<0||Game.gold<cost?'disabled':''}>${cost<0?'Maxed':'Up ◇'+cost}</button>
        <button class="btn danger" id="popSell">Sell ◇${sell}</button>
      </div>`;
    popEl.classList.add('show');this.layoutPopup(t);
    document.getElementById('popUp').onclick=e=>{e.stopPropagation();SFX.click();Game.upgradeSelected();};
    document.getElementById('popSell').onclick=e=>{e.stopPropagation();SFX.click();Game.sellSelected();};
  },
  layoutPopup(t){
    if(!t&&Game.selectedSlot)t=Game.selectedSlot.tower;
    if(!t)return;
    const wrap=document.getElementById('canvasWrap');
    const wrapRect=wrap.getBoundingClientRect();
    const cRect=canvas.getBoundingClientRect();
    const sx=(t.x/CONFIG.W)*cRect.width+(cRect.left-wrapRect.left);
    const sy=(t.y/CONFIG.H)*cRect.height+(cRect.top-wrapRect.top);
    const popH=popEl.offsetHeight,popW=popEl.offsetWidth;
    let left=sx-popW/2,top=sy-popH-12;
    if(top<8)top=sy+30;
    if(left<8)left=8;
    if(left+popW>wrapRect.width-8)left=wrapRect.width-popW-8;
    popEl.style.left=left+'px';popEl.style.top=top+'px';
  },
  hidePopup(){popEl.classList.remove('show');},
  show(html){overlay.innerHTML=html;overlay.classList.add('show');},
  hide(){overlay.classList.remove('show');overlay.innerHTML='';},
  render(){
    if(Game.state==='combat'){this.hide();this.hidePopup();this.rebuildAction();this.rebuildSynergy();return;}
    this.rebuildAction();this.rebuildSynergy();
    if(Game.state==='menu')return this.renderMenu();
    if(Game.state==='mapselect')return this.renderMapSelect();
    if(Game.state==='classselect')return this.renderClassSelect();
    if(Game.state==='shop')return this.renderShop();
    if(Game.state==='summary')return this.renderSummary();
    if(Game.state==='unlocks')return this.renderUnlocks();
    if(Game.state==='upgrades')return this.renderUpgrades();
    if(Game.state==='stats')return this.renderStats();

    const cost=Game.rerollsUsed<Game.freeRerolls?0:10+Game.rerollsUsed*5;

      const T=STAT_TAGS[tag];let display,cls='';

          </div>
          <div class="right">
            <div class="price ${can?'':'cant'}">◇${offer.cost}</div>
            <button class="lock ${locked?'on':''}" data-lock="${i}" title="Lock">${locked?'🔒':'🔓'}</button>
          </div>
        </div>`;
      } else {

        const ic=item.rarity==='legendary'?'★':item.rarity==='epic'?'◆':item.rarity==='rare'?'●':item.rarity==='uncommon'?'▲':'■';
        const tags=(item.tags||[]).map(t=>{const T=STAT_TAGS[t];if(!T)return '';
          return `<span class="stat-chip" style="color:${T.col}"><span class="ic">${T.ic}</span>${T.name}</span>`;}).join('');
        html+=`<div class="shop-card r-${item.rarity} ${can?'':'cant'} ${bought?'bought':''}" data-i="${i}">
          <div class="ic" style="color:var(--r-${item.rarity})">${ic}</div>

            <div class="name">${item.name} <span class="tag kind-item">ITEM</span> <span class="tag r-${item.rarity}">${item.rarity}</span></div>
            <div class="desc">${item.desc}</div>
            ${tags?`<div class="stat-chips">${tags}</div>`:''}
          </div>
          <div class="right">
            <div class="price ${can?'':'cant'}">◇${offer.cost}</div>
            <button class="lock ${locked?'on':''}" data-lock="${i}" title="Lock">${locked?'🔒':'🔓'}</button>
          </div>
        </div>`;
      }
    }
    html+=`</div>
      <div class="row">
        <button class="btn" id="reroll">Reroll · ${cost===0?'FREE':cost+'g'}</button>
        <button class="btn primary" id="cont">${Game.wave===0?'Begin Wave 1 ▶':'Continue ▶'}</button>
      </div>
    </div>`;
    this.show(html);
    document.querySelectorAll('canvas[data-tower]').forEach(cv=>{
      const c=cv.getContext('2d');c.imageSmoothingEnabled=true;
      Sprites.tower(c,cv.dataset.tower,23,28,0,Math.PI/2,0,1.5);
    });
    document.querySelectorAll('.shop-card[data-i]').forEach(el=>{
      el.onclick=e=>{if(e.target.closest('.lock'))return;Game.buyShop(+el.dataset.i);};
    });
    document.querySelectorAll('button[data-lock]').forEach(el=>{
      el.onclick=e=>{e.stopPropagation();Game.toggleLock(+el.dataset.lock);};
    });
    document.getElementById('reroll').onclick=()=>{Game.reroll();};
    document.getElementById('cont').onclick=()=>{SFX.click();Game.continueShop();};
  },
  renderSummary(){
    const won=Game.runWon;
    const html=`<div class="sheet">
      <h1 style="${won?'background:linear-gradient(180deg,#9bf0bd,#3aa572);':'background:linear-gradient(180deg,#ffacc0,#d14b65);'}-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">${won?'VICTORY':'DEFEAT'}</h1>
      <div class="sub">${Game.chosenClass?Game.chosenClass.name+' · '+Game.mapDef.name:''}</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="lbl">Wave</div><div class="val">${Game.wave}/18</div></div>
        <div class="stat-item"><div class="lbl">Level</div><div class="val">${Game.level}</div></div>
        <div class="stat-item"><div class="lbl">Kills</div><div class="val">${Game.kills}</div></div>
        <div class="stat-item"><div class="lbl">Gold Earned</div><div class="val">${Math.round(Game.goldEarned)}</div></div>
        <div class="stat-item"><div class="lbl">Towers</div><div class="val">${Game.towers.length}</div></div>
        <div class="stat-item"><div class="lbl">Earned</div><div class="val" style="color:var(--gold)">★ ${Game.metaEarned}</div></div>
      </div>
      <div class="row">
        <button class="btn" id="menu">Main Menu</button>
        <button class="btn primary" id="again">Play Again</button>
      </div>
    </div>`;
    this.show(html);
    document.getElementById('again').onclick=()=>{SFX.click();Game.setState('mapselect');};
    document.getElementById('menu').onclick=()=>{SFX.click();Game.setState('menu');};
  },
  renderUnlocks(){
    const sd=Game.saveData;
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Unlock Lab</h1>
      <h3>Towers</h3>
      <div class="cards">`;
    for(const t of Object.keys(CONFIG.towers)){
      const data=CONFIG.towers[t];
      const fam=CONFIG.families[data.fam];
      const owned=sd.unlockedTowers.includes(t);
      const c=(UNLOCK_TOWER_INFO[t]&&UNLOCK_TOWER_INFO[t].cost)||0;
      html+=`<div class="card ${owned?'owned':''}" data-tower="${t}">
        ${owned?'<span class="badge">Owned</span>':(c>0?`<span class="badge">★ ${c}</span>`:'<span class="badge">Owned</span>')}
        <div class="icon"><canvas width="48" height="48" data-tower="${t}"></canvas></div>
        <div class="name">${data.name}</div>
        <div class="desc">${data.desc}</div>
        <div class="fam-chip" style="color:${fam.col};border-color:${fam.col};font-size:9px;">${fam.icon} ${fam.name}</div>
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.querySelectorAll('canvas[data-tower]').forEach(cv=>{
      const c=cv.getContext('2d');c.imageSmoothingEnabled=true;
      Sprites.tower(c,cv.dataset.tower,24,28,0,Math.PI/2,0,1.6);
    });
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.querySelectorAll('.card[data-tower]').forEach(el=>{
      el.onclick=()=>{const id=el.dataset.tower;
        if(sd.unlockedTowers.includes(id))return;
        const c=UNLOCK_TOWER_INFO[id]?.cost||0;
        if(sd.currency>=c){sd.currency-=c;sd.unlockedTowers.push(id);Save.save();SFX.place();this.render();}
        else this.toast('Not enough currency','warn');
      };
    });
  },
  renderUpgrades(){
    const sd=Game.saveData;
    let html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Upgrade Tree</h1>
      <div class="sub">Permanent buffs across all runs</div>
      <div class="col">`;
    for(const u of TREE){
      const bought=sd.upgrades.includes(u.id);
      html+=`<div class="upgrade-row ${bought?'bought':''}">
        <div><div class="name">${u.name}</div></div>
        <div>${bought?'<span style="color:var(--green);font-weight:800;">✓ Bought</span>':`<button class="btn primary" data-up="${u.id}">★ ${u.cost}</button>`}</div>
      </div>`;
    }
    html+=`</div></div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.querySelectorAll('button[data-up]').forEach(el=>{
      el.onclick=()=>{const id=el.dataset.up;const u=TREE.find(x=>x.id===id);
        if(sd.currency>=u.cost){sd.currency-=u.cost;sd.upgrades.push(id);Save.save();SFX.place();
          Game.passives=Game.computePassives();this.render();}
        else this.toast('Not enough currency','warn');
      };
    });
  },
  renderStats(){
    const sd=Game.saveData;
    const html=`<div class="sheet">
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="back">← Back</button>
        <div class="currency-pill">${sd.currency}</div>
      </div>
      <h1>Stats</h1>
      <div class="stats-grid">
        <div class="stat-item"><div class="lbl">Best Wave</div><div class="val">${sd.stats.bestWave}</div></div>
        <div class="stat-item"><div class="lbl">Best Level</div><div class="val">${sd.stats.bestLevel||0}</div></div>
        <div class="stat-item"><div class="lbl">Total Runs</div><div class="val">${sd.stats.totalRuns}</div></div>
        <div class="stat-item"><div class="lbl">Total Kills</div><div class="val">${sd.stats.totalKills}</div></div>
        <div class="stat-item"><div class="lbl">Towers</div><div class="val">${sd.unlockedTowers.length}/${Object.keys(CONFIG.towers).length}</div></div>
        <div class="stat-item"><div class="lbl">Maps</div><div class="val">${sd.unlockedMaps.length}/${CONFIG.maps.length}</div></div>
        <div class="stat-item"><div class="lbl">Upgrades</div><div class="val">${sd.upgrades.length}/${TREE.length}</div></div>
        <div class="stat-item"><div class="lbl">Items in pool</div><div class="val">${ITEMS.length}</div></div>
      </div>
      <div class="row"><button class="btn danger" id="reset">Reset Save Data</button></div>
    </div>`;
    this.show(html);
    document.getElementById('back').onclick=()=>{SFX.click();Game.setState('menu');};
    document.getElementById('reset').onclick=()=>{
      if(confirm('Reset all save data?')){
        try{localStorage.removeItem(Save.KEY);}catch(e){}
        Save.data=null;Game.saveData=Save.load();
        Game.passives=Game.computePassives();this.render();
      }
    };
  },
  showInGameMenu(){
    this.show(`<div class="sheet" style="max-width:340px;">
      <h1>Paused</h1>
      <div class="menu-buttons">
        <button class="btn primary" id="resume">Resume</button>
        <button class="btn" id="restart">Surrender Run</button>
        <button class="btn ghost" id="quit">Quit to Menu</button>
      </div>
    </div>`);
    document.getElementById('resume').onclick=()=>{SFX.click();Game.paused=false;this.hide();};
    document.getElementById('restart').onclick=()=>{SFX.click();if(confirm('End this run?')){Game.endRun(false);}};
    document.getElementById('quit').onclick=()=>{SFX.click();if(confirm('Quit run? No currency awarded.')){Game.runEnded=true;Game.metaEarned=0;this.hide();Game.setState('menu');}};
  }
};

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=performance.now(),acc=0;
const STEP=1/60;
function frame(now){
  const dt=Math.min(.1,(now-lastTime)/1000);
  lastTime=now;acc+=dt;
  let steps=0;
  while(acc>=STEP&&steps<5){Game.update(STEP);acc-=STEP;steps++;}
  Render.draw();
  UI.syncFrame();
  if(Game.state==='combat'&&Game.selectedSlot&&Game.selectedSlot.tower)UI.layoutPopup(Game.selectedSlot.tower);
  requestAnimationFrame(frame);
}

Game.init();
requestAnimationFrame(frame);



</script>
